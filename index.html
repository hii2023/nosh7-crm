<!DOCTYPE html>
<html lang="en">

// ── Small Components ──────────────────────────────────────────────────────────
function Spinner() {
  return <div style={{width:18,height:18,border:`2px solid ${C.border}`,borderTopColor:C.accent,borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>;
}

function StatusBadge({status}) {
  const color = STATUS_COLORS[status]||'#6b7280';
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'2px 10px',borderRadius:999,fontSize:11,fontWeight:500,background:color+'18',color,border:`1px solid ${color}30`}}>
      <span style={{width:5,height:5,borderRadius:'50%',background:color,flexShrink:0}}/>
      {status}
    </span>
  );
}

function StatCard({label,value,color,onClick,loading}) {
  const [h,setH]=useState(false);
  return (
    <div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:h?C.surface:C.card,border:`1px solid ${h?(color||C.accent)+'50':C.border}`,borderRadius:14,padding:'16px 20px',cursor:onClick?'pointer':'default',transition:'all 0.2s',flex:1,minWidth:110,animation:'fadeIn 0.4s ease'}}>
      <p style={{color:C.textMuted,fontSize:11,marginBottom:6}}>{label}</p>
      {loading ? <Spinner/> : <p style={{fontSize:28,fontWeight:700,color:color||C.accent,lineHeight:1}}>{value}</p>}
    </div>
  );
}

function Btn({children,variant='primary',size='md',onClick,disabled,style:sx={}}) {
  const [h,setH]=useState(false);
  const base={display:'inline-flex',alignItems:'center',gap:5,cursor:disabled?'not-allowed':'pointer',border:'none',borderRadius:7,fontFamily:'inherit',fontWeight:500,transition:'all 0.15s',opacity:disabled?0.5:1,padding:size==='sm'?'5px 11px':'8px 14px',fontSize:size==='sm'?12:13};
  const v={
    primary:{background:h?'#1fbd58':C.accent,color:'#fff'},
    secondary:{background:h?C.surface:C.card,color:C.text,border:`1px solid ${C.border}`},
    danger:{background:h?'#c0392b':'#e74c3c',color:'#fff'},
    ghost:{background:h?C.surface:'transparent',color:C.textMuted,border:`1px solid ${h?C.border:'transparent'}`},
    teal:{background:h?'#0d6e64':C.accent2,color:'#fff'},
  };
  return <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{...base,...v[variant],...sx}}>{children}</button>;
}

function ABtn({icon,color,title,onClick}) {
  const [h,setH]=useState(false);
  return (
    <button title={title} onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{padding:5,borderRadius:6,background:h?color+'20':'transparent',border:'none',cursor:'pointer',display:'flex',transition:'background 0.1s'}}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={h?color:C.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:icon}}/>
    </button>
  );
}

const ICONS = {
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>',
  wa:'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',
  mail:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',
  phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.5 19.79 19.79 0 0 1 1.6 4.88 2 2 0 0 1 3.56 2.69h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.1a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 17z"/>',
  globe:'<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
  send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  search:'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  chev_l:'<polyline points="15 18 9 12 15 6"/>',
  chev_r:'<polyline points="9 18 15 12 9 6"/>',
  home:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  cal:'<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  trend:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
  sq:'<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>',
  sq_check:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  alert:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
  upload:'<polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>',
};

function Icon({name,size=14,color,style:sx={}}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color||'currentColor'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={sx} dangerouslySetInnerHTML={{__html:ICONS[name]}}/>;
}

function FInput({label,style:sx,...p}) {
  return (
    <div style={{marginBottom:12}}>
      {label&&<label style={{display:'block',fontSize:11,color:C.textMuted,marginBottom:4}}>{label}</label>}
      <input {...p} style={{width:'100%',padding:'8px 11px',borderRadius:7,fontSize:13,background:C.surface,color:C.text,border:`1px solid ${C.border}`,outline:'none',fontFamily:'inherit',...sx}}/>
    </div>
  );
}

function FSelect({label,children,style:sx,...p}) {
  return (
    <div style={{marginBottom:12}}>
      {label&&<label style={{display:'block',fontSize:11,color:C.textMuted,marginBottom:4}}>{label}</label>}
      <select {...p} style={{width:'100%',padding:'8px 11px',borderRadius:7,fontSize:13,background:C.surface,color:C.text,border:`1px solid ${C.border}`,outline:'none',fontFamily:'inherit',cursor:'pointer',...sx}}>{children}</select>
    </div>
  );
}

function Modal({title,onClose,children,width=520}) {
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16,backdropFilter:'blur(6px)'}}>
      <div style={{background:C.card,border:`1px solid ${C.borderLight}`,borderRadius:16,width:'100%',maxWidth:width,maxHeight:'92vh',overflow:'auto',animation:'fadeIn 0.2s ease'}}>
        <div style={{padding:'16px 22px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.card,zIndex:1}}>
          <h3 style={{fontWeight:600,fontSize:15,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.textMuted,display:'flex',padding:4}}><Icon name="x" size={16}/></button>
        </div>
        <div style={{padding:22}}>{children}</div>
      </div>
    </div>
  );
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function Sidebar({active,setActive,count}) {
  const items=[
    {id:'dashboard',icon:'home',label:'Dashboard'},
    {id:'leads',icon:'users',label:'Leads',badge:count},
    {id:'templates',icon:'file',label:'Templates'},
    {id:'categories',icon:'zap',label:'Categories'},
  ];
  return (
    <div style={{position:'fixed',left:0,top:0,bottom:0,width:200,background:C.card,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',zIndex:100}}>
      <div style={{padding:'20px 16px 16px',borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:C.accent+'20',display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${C.accent}40`}}>
            <Icon name="wa" size={17} color={C.accent}/>
          </div>
          <div>
            <p style={{fontWeight:700,fontSize:13,color:C.text,lineHeight:1.2}}>NOSH7 CRM</p>
            <p style={{fontSize:10,color:C.textMuted}}>WhatsApp Leads</p>
          </div>
        </div>
      </div>
      <nav style={{padding:'10px 8px',flex:1}}>
        {items.map(item=>{
          const a=active===item.id;
          return (
            <button key={item.id} onClick={()=>setActive(item.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:9,padding:'9px 11px',borderRadius:8,marginBottom:2,background:a?C.accentDim:'transparent',border:`1px solid ${a?C.accent+'40':'transparent'}`,color:a?C.accent:C.textMuted,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:a?600:400,transition:'all 0.15s',textAlign:'left'}}>
              <Icon name={item.icon} size={14} color={a?C.accent:C.textMuted}/>
              <span style={{flex:1}}>{item.label}</span>
              {item.badge!==undefined&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:999,background:C.accent+'20',color:C.accent}}>{item.badge}</span>}
            </button>
          );
        })}
      </nav>
      <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:C.accent}}/>
          <p style={{fontSize:10,color:C.textDim}}>Supabase connected</p>
        </div>
      </div>
    </div>

}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function DashboardView({leads,categories,onTab,loading}) {
  const today=new Date().toISOString().split('T')[0];
  const s={
    total:leads.length,
    newL:leads.filter(l=>l.status==='New').length,
    interested:leads.filter(l=>l.status==='Interested').length,
    today:leads.filter(l=>l.follow_up_date===today).length,
    converted:leads.filter(l=>l.status==='Converted').length,
  };
  const dist=STATUSES.map(st=>({st,count:leads.filter(l=>l.status===st).length,color:STATUS_COLORS[st]})).filter(d=>d.count>0);
  const maxC=Math.max(...dist.map(d=>d.count),1);
  const catDist=categories.map(c=>({c,count:leads.filter(l=>l.category===c).length})).filter(x=>x.count>0);
  const recent=[...leads].sort((a,b)=>b.created_date?.localeCompare(a.created_date||'')||0).slice(0,5);

  return (
    <div style={{animation:'fadeIn 0.3s ease'}}>
      <div style={{marginBottom:22}}>
        <h1 style={{fontSize:22,fontWeight:700,color:C.text}}>Dashboard</h1>
        <p style={{color:C.textMuted,fontSize:12,marginTop:2}}>{new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      </div>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:18}}>
        <StatCard label="Total Leads" value={s.total} loading={loading}/>
        <StatCard label="New" value={s.newL} color="#60a5fa" loading={loading} onClick={()=>onTab('leads')}/>
        <StatCard label="Interested" value={s.interested} color="#a78bfa" loading={loading}/>
        <StatCard label="Follow Up Today" value={s.today} color="#fbbf24" loading={loading}/>
        <StatCard label="Converted" value={s.converted} color="#4ade80" loading={loading}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18}}>
          <p style={{fontWeight:600,fontSize:13,color:C.text,marginBottom:14}}>Status Distribution</p>
          {dist.length===0?<p style={{color:C.textMuted,fontSize:12}}>No data yet</p>:dist.map(({st,count,color})=>(
            <div key={st} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:11,color:C.textMuted}}>{st}</span>
                <span style={{fontSize:11,fontWeight:600,color}}>{count}</span>
              </div>
              <div style={{height:5,background:C.surface,borderRadius:999}}>
                <div style={{height:'100%',width:`${(count/maxC)*100}%`,background:color,borderRadius:999,transition:'width 0.8s ease'}}/>
              </div>
            </div>
          ))}
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18}}>
          <p style={{fontWeight:600,fontSize:13,color:C.text,marginBottom:14}}>Category Breakdown</p>
          {catDist.length===0?<p style={{color:C.textMuted,fontSize:12}}>No data yet</p>:(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {catDist.map(({c,count})=>(
                <div key={c} style={{background:C.surface,borderRadius:9,padding:'12px 13px',border:`1px solid ${C.border}`}}>
                  <p style={{fontSize:22,fontWeight:700,color:C.accent,lineHeight:1}}>{count}</p>
                  <p style={{fontSize:11,color:C.textMuted,marginTop:3}}>{c}</p>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      {recent.length>0&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18}}>
          <p style={{fontWeight:600,fontSize:13,color:C.text,marginBottom:14}}>Recently Added</p>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
              {['Name','Phone','Status','Category','Date'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'5px 12px',fontSize:10,color:C.textMuted,fontWeight:500}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {recent.map(l=>(
                <tr key={l.id} style={{borderBottom:`1px solid ${C.border}22`}}>
                  <td style={{padding:'9px 12px',fontSize:13,color:C.text,fontWeight:500}}>{l.name}</td>
                  <td style={{padding:'9px 12px',fontSize:11,color:C.textMuted,fontFamily:'monospace'}}>{l.phone}</td>
                  <td style={{padding:'9px 12px'}}><StatusBadge status={l.status}/></td>
                  <td style={{padding:'9px 12px',fontSize:11,color:C.textMuted}}>{l.category}</td>
                  <td style={{padding:'9px 12px',fontSize:11,color:C.textMuted}}>{l.created_date}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── Lead Form Modal ───────────────────────────────────────────────────────────
function LeadFormModal({lead,categories,onClose,onSave,saving}) {
  const [f,setF]=useState(lead||{status:'New',category:categories[0]||'Residential'});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return (
    <Modal title={lead?'Edit Lead':'Add New Lead'} onClose={onClose}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
        <FInput label="Full Name *" value={f.name||''} onChange={e=>s('name',e.target.value)} placeholder="Name"/>
        <FInput label="Phone *" value={f.phone||''} onChange={e=>s('phone',e.target.value)} placeholder="9876543210"/>
        <FInput label="Email" value={f.email||''} onChange={e=>s('email',e.target.value)} placeholder="email@example.com"/>
        <FInput label="Website" value={f.website||''} onChange={e=>s('website',e.target.value)} placeholder="domain.com"/>
        <div style={{gridColumn:'1/-1'}}><FInput label="Address" value={f.address||''} onChange={e=>s('address',e.target.value)} placeholder="Area, City"/></div>
        <FSelect label="Status" value={f.status||'New'} onChange={e=>s('status',e.target.value)}>
          {STATUSES.map(st=><option key={st}>{st}</option>)}
        </FSelect>
        <FSelect label="Category" value={f.category||''} onChange={e=>s('category',e.target.value)}>
          {categories.map(c=><option key={c}>{c}</option>)}
        </FSelect>
        <FInput label="Area" value={f.area||''} onChange={e=>s('area',e.target.value)} placeholder="Bopal, Satellite..."/>
        <FInput label="Follow Up Date" type="date" value={f.follow_up_date||''} onChange={e=>s('follow_up_date',e.target.value)}/>
        <div style={{gridColumn:'1/-1',marginBottom:12}}>
          <label style={{display:'block',fontSize:11,color:C.textMuted,marginBottom:4}}>Notes</label>
          <textarea value={f.notes||''} onChange={e=>s('notes',e.target.value)} rows={3} placeholder="Requirements, budget, notes..."
            style={{width:'100%',padding:'8px 11px',borderRadius:7,fontSize:13,background:C.surface,color:C.text,border:`1px solid ${C.border}`,outline:'none',fontFamily:'inherit',resize:'vertical'}}/>
        </div>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={()=>onSave(f)} disabled={!f.name||!f.phone||saving}>
          {saving?<Spinner/>:<Icon name="check" size={12}/>}
          {lead?'Update Lead':'Add Lead'}
        </Btn>
      </div>
    </Modal>
  );
}

// ── WhatsApp Modal ────────────────────────────────────────────────────────────
function WpModal({lead,templates,onClose,onSend}) {
  const [msg,setMsg]=useState('');
  const [tpl,setTpl]=useState('');
  const pick=(id)=>{setTpl(id);if(id){const t=templates.find(t=>t.id===id);if(t)setMsg(t.message.replace(/{name}/g,lead.name));}else setMsg('');};
  const go=()=>{
    const ph=(lead.phone||'').replace(/\D/g,'');
    window.open(`https://wa.me/${ph.length===10?'91'+ph:ph}?text=${encodeURIComponent(msg)}`,'_blank');
    onSend();
  };
  return (
    <Modal title="Send WhatsApp Message" onClose={onClose} width={460}>
      <div style={{marginBottom:14,padding:'12px 14px',background:C.surface,borderRadius:9,border:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:38,height:38,borderRadius:'50%',background:C.accent+'20',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <Icon name="wa" size={17} color={C.accent}/>
        </div>
        <div>
          <p style={{fontWeight:600,fontSize:13,color:C.text}}>{lead.name}</p>
          <p style={{fontSize:11,color:C.textMuted,fontFamily:'monospace'}}>+91 {lead.phone}</p>
        </div>
      </div>
      <FSelect label="Template (optional)" value={tpl} onChange={e=>pick(e.target.value)}>
        <option value="">— Select a template —</option>
        {templates.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
      </FSelect>
      <div style={{marginBottom:14}}>
        <label style={{display:'block',fontSize:11,color:C.textMuted,marginBottom:4}}>Message</label>
        <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={5} placeholder="Type your message here..."
          style={{width:'100%',padding:'8px 11px',borderRadius:7,fontSize:13,background:C.surface,color:C.text,border:`1px solid ${C.border}`,outline:'none',fontFamily:'inherit',resize:'vertical'}}/>
        <p style={{fontSize:10,color:C.textMuted,marginTop:3}}>{msg.length} chars</p>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={go} disabled={!msg.trim()}><Icon name="send" size={12} color="#fff"/>Open WhatsApp</Btn>
      </div>
    </Modal>
  );
}

// ── Leads View ────────────────────────────────────────────────────────────────
function LeadsView({leads,setLeads,categories,templates,showToast,loading}) {
  const [search,setSearch]=useState('');
  const [sf,setSf]=useState('all');
  const [cf,setCf]=useState('all');
  const [sort,setSort]=useState({field:'created_date',dir:'desc'});
  const [page,setPage]=useState(1);
  const [sel,setSel]=useState(new Set());
  const [showAdd,setShowAdd]=useState(false);
  const [editing,setEditing]=useState(null);
  const [wpLead,setWpLead]=useState(null);
  const [saving,setSaving]=useState(false);
  const [showBulk,setShowBulk]=useState(false);
  const [bulkField,setBulkField]=useState('status');
  const [bulkVal,setBulkVal]=useState('');
  const [importing,setImporting]=useState(false);

  const filtered=useMemo(()=>{
    let r=[...leads];
    if(search){const q=search.toLowerCase();r=r.filter(l=>l.name?.toLowerCase().includes(q)||l.phone?.includes(q)||l.email?.toLowerCase().includes(q)||l.area?.toLowerCase().includes(q));}
    if(sf!=='all')r=r.filter(l=>l.status===sf);
    if(cf!=='all')r=r.filter(l=>l.category===cf);
    r.sort((a,b)=>{const av=a[sort.field]||'',bv=b[sort.field]||'';return sort.dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);});
    return r;
  },[leads,search,sf,cf,sort]);

  const pages=Math.ceil(filtered.length/PER_PAGE)||1;
  const paged=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);
  const sortBy=(f)=>setSort(s=>({field:f,dir:s.field===f&&s.dir==='asc'?'desc':'asc'}));
  const toggleAll=()=>setSel(s=>s.size===paged.length&&paged.length>0?new Set():new Set(paged.map(l=>l.id)));
  const toggleOne=(id)=>setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});

  const exportCSV=()=>{
    const h=['Name','Phone','Email','Status','Category','Area','Follow Up','Last Contacted','Notes'];
    const rows=filtered.map(l=>[l.name,l.phone,l.email,l.status,l.category,l.area,l.follow_up_date,l.last_contacted,l.notes].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
    const csv=[h.join(','),...rows].join('\n');
    Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'nosh7_leads.csv'}).click();
    showToast('CSV exported!');
  };

  const handleImport=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async(ev)=>{
      try{
        setImporting(true);
        const lines=ev.target.result.split('\n').filter(Boolean);
        const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
        const newLeads=lines.slice(1).map(line=>{
          const vals=line.split(',').map(v=>v.replace(/^"|"$/g,'').trim());
          const obj={};
          headers.forEach((h,i)=>obj[h]=vals[i]||'');
          return {id:Date.now().toString()+Math.random(),name:obj.name||'',phone:obj.phone||'',email:obj.email||'',status:obj.status||'New',category:obj.category||categories[0]||'',area:obj.area||'',notes:obj.notes||'',follow_up_date:obj['follow up']||'',last_contacted:obj['last contacted']||'',website:obj.website||'',address:obj.address||'',created_date:new Date().toISOString().split('T')[0]};
        }).filter(l=>l.name&&l.phone);
        if(newLeads.length===0){showToast('No valid rows found','error');return;}
        const {error}=await db.from('leads').insert(newLeads);
        if(error)throw error;
        setLeads(p=>[...p,...newLeads]);
        showToast(`Imported ${newLeads.length} leads!`);
      }catch(err){showToast('Import failed: '+err.message,'error');}
      finally{setImporting(false);e.target.value='';}
    };
    r.readAsText(file);
  };

  const saveLead=async(data)=>{
    setSaving(true);
    try{
      if(editing){
        const {error}=await db.from('leads').update(data).eq('id',editing.id);
        if(error)throw error;
        setLeads(p=>p.map(l=>l.id===editing.id?{...data,id:editing.id}:l));
        showToast('Lead updated!');
      }else{
        const newL={...data,id:Date.now().toString(),created_date:new Date().toISOString().split('T')[0]};
        const {error}=await db.from('leads').insert([newL]);
        if(error)throw error;
        setLeads(p=>[newL,...p]);
        showToast('Lead added!');
      }
      setShowAdd(false);setEditing(null);
    }catch(err){showToast('Error: '+err.message,'error');}
    finally{setSaving(false);}
  };

  const deleteLead=async(id)=>{
    const {error}=await db.from('leads').delete().eq('id',id);
    if(error){showToast('Delete failed','error');return;}
    setLeads(p=>p.filter(l=>l.id!==id));
    showToast('Lead deleted');
  };

  const bulkDelete=async()=>{
    const ids=[...sel];
    const {error}=await db.from('leads').delete().in('id',ids);
    if(error){showToast('Error','error');return;}
    setLeads(p=>p.filter(l=>!sel.has(l.id)));
    showToast(`${ids.length} leads deleted`);setSel(new Set());
  };

  const bulkUpdate=async()=>{
    if(!bulkVal)return;
    const ids=[...sel];
    const {error}=await db.from('leads').update({[bulkField]:bulkVal}).in('id',ids);
    if(error){showToast('Error','error');return;}
    setLeads(p=>p.map(l=>sel.has(l.id)?{...l,[bulkField]:bulkVal}:l));
    showToast(`${ids.length} leads updated`);setSel(new Set());setShowBulk(false);
  };

  const sendWp=(lead)=>{
    setLeads(p=>p.map(l=>l.id===lead.id?{...l,last_contacted:new Date().toISOString().split('T')[0]}:l));
    db.from('leads').update({last_contacted:new Date().toISOString().split('T')[0]}).eq('id',lead.id);
    setWpLead(null);showToast('WhatsApp opened!');
  };

  const th={textAlign:'left',padding:'8px 12px',fontSize:10,color:C.textMuted,fontWeight:500,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'};

  return (
    <div style={{animation:'fadeIn 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:C.text}}>Leads</h1>
          <p style={{color:C.textMuted,fontSize:12}}>{filtered.length} leads{(search||sf!=='all'||cf!=='all')?' (filtered)':''}</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <label style={{display:'inline-flex',alignItems:'center',gap:5,cursor:'pointer',padding:'5px 11px',borderRadius:7,background:C.card,border:`1px solid ${C.border}`,fontSize:12,color:C.textMuted,fontFamily:'inherit',fontWeight:500}}>
            {importing?<Spinner/>:<Icon name="upload" size={13}/>}
            Import CSV
            <input type="file" accept=".csv" onChange={handleImport} style={{display:'none'}}/>
          </label>
          <Btn variant="secondary" size="sm" onClick={exportCSV}><Icon name="download" size={13}/>Export CSV</Btn>
          <Btn size="sm" onClick={()=>{setShowAdd(true);setEditing(null);}}><Icon name="plus" size={13} color="#fff"/>Add Lead</Btn>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <Icon name="search" size={13} style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:C.textMuted}}/>
          <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="Search name, phone, area..."
            style={{width:'100%',paddingLeft:30,paddingRight:10,paddingTop:7,paddingBottom:7,borderRadius:7,fontSize:12,background:C.card,color:C.text,border:`1px solid ${C.border}`,outline:'none',fontFamily:'inherit'}}/>
        </div>
        <select value={sf} onChange={e=>{setSf(e.target.value);setPage(1);}} style={{padding:'7px 10px',borderRadius:7,fontSize:12,background:C.card,color:C.text,border:`1px solid ${C.border}`,cursor:'pointer',fontFamily:'inherit'}}>
          <option value="all">All Status</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={cf} onChange={e=>{setCf(e.target.value);setPage(1);}} style={{padding:'7px 10px',borderRadius:7,fontSize:12,background:C.card,color:C.text,border:`1px solid ${C.border}`,cursor:'pointer',fontFamily:'inherit'}}>
          <option value="all">All Categories</option>{categories.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>

      {sel.size>0&&(
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:C.accentDim,border:`1px solid ${C.accent}40`,borderRadius:9,marginBottom:10,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:C.accent,fontWeight:600}}>{sel.size} selected</span>
          <div style={{flex:1}}/>
          <Btn size="sm" variant="teal" onClick={()=>setShowBulk(true)}>Bulk Update</Btn>
          <Btn size="sm" variant="danger" onClick={bulkDelete}><Icon name="trash" size={11} color="#fff"/>Delete</Btn>
          <Btn size="sm" variant="ghost" onClick={()=>setSel(new Set())}><Icon name="x" size={11}/>Clear</Btn>
        </div>
      )}

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,overflow:'hidden'}}>
        {loading?(
          <div style={{padding:48,display:'flex',justifyContent:'center'}}><Spinner/></div>
        ):(
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',minWidth:800}}>
              <thead>
                <tr style={{background:C.surface,borderBottom:`1px solid ${C.border}`}}>
                  <th style={{padding:'8px 14px',width:36}}>
                    <button onClick={toggleAll} style={{background:'none',border:'none',cursor:'pointer',color:sel.size===paged.length&&paged.length>0?C.accent:C.textMuted,display:'flex'}}>
                      <Icon name={sel.size===paged.length&&paged.length>0?'sq_check':'sq'} size={14} color={sel.size===paged.length&&paged.length>0?C.accent:C.textMuted}/>
                    </button>
                  </th>
                  {[['name','Name'],['phone','Phone'],['status','Status'],['category','Category'],['area','Area'],['follow_up_date','Follow Up'],['last_contacted','Last Contact']].map(([f,l])=>(
                    <th key={f} onClick={()=>sortBy(f)} style={th}>
                      {l}{sort.field===f&&<span style={{color:C.accent,marginLeft:3,fontSize:8}}>{sort.dir==='asc'?'▲':'▼'}</span>}
                    </th>
                  ))}
                  <th style={{...th,cursor:'default'}}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {paged.length===0?(
                  <tr><td colSpan={9} style={{padding:40,textAlign:'center',color:C.textMuted,fontSize:13}}>No leads found</td></tr>
                ):paged.map((lead,i)=>{
                  const h=sel.has(lead.id);
                  const overdue=lead.follow_up_date&&lead.follow_up_date<new Date().toISOString().split('T')[0];
                  return (
                    <tr key={lead.id} style={{borderBottom:i===paged.length-1?'none':`1px solid ${C.border}25`,background:h?C.accentDim+'80':'transparent',transition:'background 0.1s'}}>
                      <td style={{padding:'8px 14px'}}>
                        <button onClick={()=>toggleOne(lead.id)} style={{background:'none',border:'none',cursor:'pointer',color:h?C.accent:C.textMuted,display:'flex'}}>
                          <Icon name={h?'sq_check':'sq'} size={13} color={h?C.accent:C.textMuted}/>
                        </button>
                      </td>
                      <td style={{padding:'8px 12px'}}>
                        <div style={{fontWeight:500,fontSize:13,color:C.text}}>{lead.name}</div>
                        {lead.email&&<div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{lead.email}</div>}
                      </td>
                      <td style={{padding:'8px 12px',fontSize:11,color:C.textMuted,fontFamily:'monospace'}}>{lead.phone}</td>
                      <td style={{padding:'8px 12px'}}><StatusBadge status={lead.status}/></td>
                      <td style={{padding:'8px 12px',fontSize:11,color:C.textMuted}}>{lead.category}</td>
                      <td style={{padding:'8px 12px',fontSize:11,color:C.textMuted}}>{lead.area||'—'}</td>
                      <td style={{padding:'8px 12px',fontSize:11,color:overdue?'#f87171':lead.follow_up_date?'#fbbf24':C.textMuted}}>{lead.follow_up_date||'—'}</td>
                      <td style={{padding:'8px 12px',fontSize:11,color:C.textMuted}}>{lead.last_contacted||'—'}</td>
                      <td style={{padding:'8px 12px'}}>
                        <div style={{display:'flex',gap:1}}>
                          <ABtn icon={ICONS.wa} color="#25D366" title="WhatsApp" onClick={()=>setWpLead(lead)}/>
                          {lead.email&&<ABtn icon={ICONS.mail} color="#60a5fa" title="Email" onClick={()=>window.open(`mailto:${lead.email}`)}/>}
                          <ABtn icon={ICONS.phone} color="#a78bfa" title="Call" onClick={()=>window.open(`tel:${lead.phone}`)}/>
                          {lead.website&&<ABtn icon={ICONS.globe} color="#34d399" title="Website" onClick={()=>window.open(`https://${lead.website}`,'_blank')}/>}
                          <ABtn icon={ICONS.edit} color={C.textMuted} title="Edit" onClick={()=>setEditing(lead)}/>
                          <ABtn icon={ICONS.trash} color="#f87171" title="Delete" onClick={()=>deleteLead(lead.id)}/>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
        {pages>1&&(
          <div style={{padding:'10px 16px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:11,color:C.textMuted}}>Page {page} of {pages} · {filtered.length} total</span>
            <div style={{display:'flex',gap:5}}>
              <Btn size="sm" variant="secondary" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}><Icon name="chev_l" size={12}/></Btn>
              {Array.from({length:Math.min(5,pages)},(_,i)=>{const p=Math.max(1,Math.min(pages-4,page-2))+i;return <Btn key={p} size="sm" variant={p===page?'primary':'secondary'} onClick={()=>setPage(p)}>{p}</Btn>;});}
              <Btn size="sm" variant="secondary" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={page===pages}><Icon name="chev_r" size={12}/></Btn>
            </div>
          </div>
        )}
      </div>

      {(showAdd||editing)&&<LeadFormModal lead={editing} categories={categories} onClose={()=>{setShowAdd(false);setEditing(null);}} onSave={saveLead} saving={saving}/>}
      {wpLead&&<WpModal lead={wpLead} templates={templates} onClose={()=>setWpLead(null)} onSend={()=>sendWp(wpLead)}/>}
      {showBulk&&(
        <Modal title={`Bulk Update ${sel.size} Leads`} onClose={()=>setShowBulk(false)} width={400}>
          <FSelect label="Field to update" value={bulkField} onChange={e=>setBulkField(e.target.value)}>
            <option value="status">Status</option>
            <option value="category">Category</option>
          </FSelect>
          <FSelect label="New value" value={bulkVal} onChange={e=>setBulkVal(e.target.value)}>
            <option value="">— Select —</option>
            {(bulkField==='status'?STATUSES:categories).map(v=><option key={v}>{v}</option>)}
          </FSelect>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:6}}>
            <Btn variant="secondary" onClick={()=>setShowBulk(false)}>Cancel</Btn>
            <Btn onClick={bulkUpdate} disabled={!bulkVal}>Update {sel.size} Leads</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Templates View ────────────────────────────────────────────────────────────
function TemplatesView({templates,setTemplates,showToast}) {
  const [editing,setEditing]=useState(null);
  const [f,setF]=useState({name:'',message:''});
  const [saving,setSaving]=useState(false);

  const openNew=()=>{setEditing('new');setF({name:'',message:''}); };
  const openEdit=(t)=>{setEditing(t);setF({name:t.name,message:t.message});};
  const cancel=()=>{setEditing(null);setF({name:'',message:''});};

  const save=async()=>{
    if(!f.name||!f.message)return;
    setSaving(true);
    try{
      if(editing==='new'){
        const newT={id:'t'+Date.now(),name:f.name,message:f.message};
        const {error}=await db.from('templates').insert([newT]);
        if(error)throw error;
        setTemplates(p=>[...p,newT]);
        showToast('Template added!');
      }else{
        const {error}=await db.from('templates').update({name:f.name,message:f.message}).eq('id',editing.id);
        if(error)throw error;
        setTemplates(p=>p.map(t=>t.id===editing.id?{...t,...f}:t));
        showToast('Template updated!');
      }
      cancel();
    }catch(err){showToast('Error: '+err.message,'error');}
    finally{setSaving(false);}
  };

  const del=async(id)=>{
    const {error}=await db.from('templates').delete().eq('id',id);
    if(error){showToast('Error','error');return;}
    setTemplates(p=>p.filter(t=>t.id!==id));showToast('Deleted');
  };

  return (
    <div style={{animation:'fadeIn 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <div><h1 style={{fontSize:22,fontWeight:700,color:C.text}}>Templates</h1><p style={{color:C.textMuted,fontSize:12}}>Saved WhatsApp message templates</p></div>
        <Btn onClick={openNew}><Icon name="plus" size={13} color="#fff"/>New Template</Btn>
      </div>
      {editing&&(
        <div style={{background:C.card,border:`1px solid ${C.accent}40`,borderRadius:13,padding:18,marginBottom:18,animation:'fadeIn 0.2s ease'}}>
          <p style={{fontWeight:600,fontSize:13,color:C.text,marginBottom:13}}>{editing==='new'?'New Template':'Edit Template'}</p>
          <FInput label="Template Name" value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} placeholder="e.g. Initial Greeting"/>
          <div style={{marginBottom:12}}>
            <label style={{display:'block',fontSize:11,color:C.textMuted,marginBottom:4}}>
              Message <span style={{color:C.accent}}>· Use {'{name}'} to personalize</span>
            </label>
            <textarea value={f.message} onChange={e=>setF(p=>({...p,message:e.target.value}))} rows={4} placeholder="Hello {name}! ..."
              style={{width:'100%',padding:'8px 11px',borderRadius:7,fontSize:13,background:C.surface,color:C.text,border:`1px solid ${C.border}`,outline:'none',fontFamily:'inherit',resize:'vertical'}}/>
          </div>
          <div style={{display:'flex',gap:7}}>
            <Btn onClick={save} disabled={!f.name||!f.message||saving}>{saving?<Spinner/>:<Icon name="check" size={12} color="#fff"/>}Save</Btn>
            <Btn variant="secondary" onClick={cancel}>Cancel</Btn>
          </div>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:12}}>
        {templates.map(t=>(
          <div key={t.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:16,transition:'border-color 0.2s'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>
                <p style={{fontWeight:600,fontSize:13,color:C.text}}>{t.name}</p>
                <span style={{fontSize:10,color:C.textMuted}}>{t.message.length} chars</span>
              </div>
              <div style={{display:'flex',gap:3}}>
                <ABtn icon={ICONS.edit} color={C.textMuted} title="Edit" onClick={()=>openEdit(t)}/>
                <ABtn icon={ICONS.trash} color="#f87171" title="Delete" onClick={()=>del(t.id)}/>
              </div>
            </div>
            <p style={{fontSize:12,color:C.textMuted,lineHeight:1.65,background:C.surface,padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`}}>{t.message}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Categories View ───────────────────────────────────────────────────────────
function CategoriesView({categories,setCategories,leads,showToast}) {
  const [newCat,setNewCat]=useState('');
  const [adding,setAdding]=useState(false);
  const [saving,setSaving]=useState(false);

  const add=async()=>{
    const trimmed=newCat.trim();
    if(!trimmed||categories.includes(trimmed))return;
    setSaving(true);
    try{
      const {error}=await db.from('categories').insert([{name:trimmed}]);
      if(error)throw error;
      setCategories(p=>[...p,trimmed]);
      showToast('Category added!');setNewCat('');setAdding(false);
    }catch(err){showToast('Error: '+err.message,'error');}
    finally{setSaving(false);}
  };

  const del=async(cat)=>{
    const count=leads.filter(l=>l.category===cat).length;
    if(count>0){showToast(`Can't delete: ${count} leads use this category`,'error');return;}
    const {error}=await db.from('categories').delete().eq('name',cat);
    if(error){showToast('Error','error');return;}
    setCategories(p=>p.filter(c=>c!==cat));showToast('Category deleted');
  };

  return (
    <div style={{animation:'fadeIn 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <div><h1 style={{fontSize:22,fontWeight:700,color:C.text}}>Categories</h1><p style={{color:C.textMuted,fontSize:12}}>Organize leads by property type</p></div>
        <Btn onClick={()=>setAdding(true)}><Icon name="plus" size={13} color="#fff"/>Add Category</Btn>
      </div>
      {adding&&(
        <div style={{display:'flex',gap:8,marginBottom:16,alignItems:'flex-end',background:C.card,padding:14,borderRadius:11,border:`1px solid ${C.accent}40`}}>
          <div style={{flex:1}}><FInput label="Category Name" value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="e.g. Luxury Residential" style={{marginBottom:0}}/></div>
          <Btn onClick={add} disabled={!newCat.trim()||saving}>{saving?<Spinner/>:<Icon name="check" size={12} color="#fff"/>}Add</Btn>
          <Btn variant="secondary" onClick={()=>{setAdding(false);setNewCat('');}}>Cancel</Btn>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:11}}>
        {categories.map(cat=>{
          const count=leads.filter(l=>l.category===cat).length;
          return (
            <div key={cat} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'16px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'border-color 0.2s'}}>
              <div>
                <p style={{fontWeight:600,fontSize:14,color:C.text}}>{cat}</p>
                <p style={{fontSize:11,color:C.textMuted,marginTop:3}}>{count} lead{count!==1?'s':''}</p>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:24,fontWeight:700,color:C.accent}}>{count}</span>
                <ABtn icon={ICONS.trash} color="#f87171" title="Delete" onClick={()=>del(cat)}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [leads,setLeads]=useState([]);
  const [templates,setTemplates]=useState([]);
  const [categories,setCategories]=useState([]);
  const [tab,setTab]=useState('dashboard');
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);

  const showToast=(msg,type='success')=>{
    setToast({msg,type});setTimeout(()=>setToast(null),3500);
  };

  useEffect(()=>{
    const init=async()=>{
      setLoading(true);
      try{
        const [leadsRes,tplRes,catRes]=await Promise.all([
          db.from('leads').select('*').order('created_date',{ascending:false}),
          db.from('templates').select('*'),
          db.from('categories').select('*'),
        ]);
        if(leadsRes.error)throw leadsRes.error;
        if(tplRes.error)throw tplRes.error;
        if(catRes.error)throw catRes.error;

        setLeads(leadsRes.data||[]);

        // Seed templates if empty
        if((tplRes.data||[]).length===0){
          await db.from('templates').insert(DEFAULT_TEMPLATES);
          setTemplates(DEFAULT_TEMPLATES);
        }else{setTemplates(tplRes.data);}

        // Seed categories if empty
        const existingCats=(catRes.data||[]).map(c=>c.name);
        if(existingCats.length===0){
          await db.from('categories').insert(DEFAULT_CATEGORIES.map(name=>({name})));
          setCategories(DEFAULT_CATEGORIES);
        }else{setCategories(existingCats);}

      }catch(err){
        showToast('DB error: '+err.message,'error');
        setTemplates(DEFAULT_TEMPLATES);setCategories(DEFAULT_CATEGORIES);
      }finally{setLoading(false);}
    };
    init();
  },[]);

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active={tab} setActive={setTab} count={leads.length}/>
      <main style={{marginLeft:200,flex:1,padding:'26px 28px',minHeight:'100vh',background:C.bg}}>
        {tab==='dashboard'&&<DashboardView leads={leads} categories={categories} onTab={setTab} loading={loading}/>}
        {tab==='leads'&&<LeadsView leads={leads} setLeads={setLeads} categories={categories} templates={templates} showToast={showToast} loading={loading}/>}
        {tab==='templates'&&<TemplatesView templates={templates} setTemplates={setTemplates} showToast={showToast}/>}
        {tab==='categories'&&<CategoriesView categories={categories} setCategories={setCategories} leads={leads} showToast={showToast}/>}
      </main>
      {toast&&(
        <div style={{position:'fixed',bottom:22,right:22,zIndex:2000,display:'flex',alignItems:'center',gap:8,padding:'11px 16px',borderRadius:10,background:toast.type==='error'?'#2a0a0a':C.accentDim,border:`1px solid ${toast.type==='error'?'#f87171':C.accent}60`,color:toast.type==='error'?'#f87171':C.accent,fontSize:12,fontWeight:500,boxShadow:'0 8px 32px rgba(0,0,0,0.6)',animation:'toastIn 0.2s ease',maxWidth:340}}>
          <Icon name={toast.type==='error'?'alert':'check'} size={14} color={toast.type==='error'?'#f87171':C.accent}/>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
