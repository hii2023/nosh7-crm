<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NOSH7 CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f0f9ff;--card:#fff;--surface:#f8fafc;--border:#e2e8f0;
  --accent:#22c55e;--accent-d:#16a34a;--accent-dim:#dcfce7;
  --wa:#25D366;--wa-d:#128C7E;
  --text:#0f172a;--muted:#64748b;--dim:#94a3b8;
  --red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  --sb-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,textarea,button{font-family:'Sora',sans-serif}

/* sidebar */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sb-w);background:#0f172a;display:flex;flex-direction:column;z-index:200;transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.15)}
#sidebar.hidden{transform:translateX(calc(-1 * var(--sb-w)))}
#sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
#sb-ov.show{display:block}
#main{margin-left:var(--sb-w);transition:margin-left .25s ease;min-height:100vh;padding:20px 24px}
#main.full{margin-left:0}
#tbtn{position:fixed;top:12px;left:12px;z-index:300;width:36px;height:36px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(34,197,94,.4);transition:all .2s}
#tbtn:hover{background:var(--accent-d)}
#tbtn.sh{left:calc(var(--sb-w) + 10px)}

/* nav */
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;margin-bottom:3px;border:1px solid transparent;cursor:pointer;font-size:12px;font-weight:400;transition:all .15s;text-align:left;background:transparent;color:#94a3b8}
.nav-btn:hover{background:#1e293b;color:#e2e8f0}
.nav-btn.active{background:#16a34a22;border-color:#22c55e40;color:#4ade80;font-weight:600}
.nbadge{font-size:10px;padding:1px 6px;border-radius:999px;background:#22c55e20;color:#4ade80;margin-left:auto}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:5px;cursor:pointer;border:none;border-radius:8px;font-weight:500;transition:all .15s;font-size:13px;padding:8px 14px;white-space:nowrap}
.btn-sm{font-size:11px;padding:5px 10px}
.btn-xs{font-size:11px;padding:3px 8px}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 1px 6px rgba(34,197,94,.3)}.btn-p:hover{background:var(--accent-d)}
.btn-s{background:var(--card);color:var(--text);border:1.5px solid var(--border)}.btn-s:hover{background:var(--surface);border-color:var(--accent)}
.btn-d{background:var(--red);color:#fff}.btn-d:hover{background:#dc2626}
.btn-g{background:transparent;color:var(--muted);border:1.5px solid transparent}.btn-g:hover{background:var(--surface);border-color:var(--border)}
.btn-wa{background:var(--wa);color:#fff;font-size:11px;padding:4px 9px;border-radius:6px}.btn-wa:hover{background:var(--wa-d)}
.btn-call{background:#3b82f6;color:#fff;font-size:11px;padding:4px 9px;border-radius:6px}.btn-call:hover{background:#2563eb}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

/* inputs */
.input{width:100%;padding:8px 12px;border-radius:8px;font-size:13px;background:var(--card);color:var(--text);border:1.5px solid var(--border);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.fg{margin-bottom:13px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}

/* card / table */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:9px 12px;font-size:10px;color:var(--muted);font-weight:600;user-select:none;white-space:nowrap;background:var(--surface);text-transform:uppercase;letter-spacing:.05em}
.table th.s{cursor:pointer}.table th.s:hover{color:var(--accent)}
.table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
.table tr:last-child td{border-bottom:none}
.table tbody tr:hover td{background:#f0fdf4}

/* modal */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:18px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mh{padding:16px 22px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1}
.mb{padding:22px}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.ab{padding:5px;border-radius:6px;background:transparent;border:none;cursor:pointer;display:inline-flex;transition:background .1s;color:var(--muted)}
.ab:hover{background:var(--surface)}

/* stat card */
.stat{flex:1;min-width:90px;padding:14px 16px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s}
.stat.cl{cursor:pointer}.stat.cl:hover{border-color:var(--accent);box-shadow:0 4px 12px rgba(34,197,94,.15)}

/* mobile lead cards */
.lead-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.lead-card-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.lead-field{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:12px;color:var(--muted)}
.lead-field strong{color:var(--text);font-weight:500}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.spin{animation:spin .7s linear infinite}
.fade{animation:fadeIn .2s ease}

/* desktop: show full table */
.mobile-only{display:none}
.desktop-only{display:block}

@media(max-width:768px){
  #sidebar{width:280px !important}
  #sidebar.hidden{transform:translateX(-280px)}
  #sb-ov{display:block;pointer-events:none;opacity:0;transition:opacity .25s}
  #sb-ov.show{pointer-events:all;opacity:1}
  #main{margin-left:0 !important;padding:12px 10px}
  #tbtn{left:12px !important}
  #tbtn.sh{left:12px !important}
  .g2{grid-template-columns:1fr}
  h1.page-title{font-size:17px !important;margin-top:0}
  .btn{font-size:12px;padding:6px 10px}
  .btn-sm{font-size:11px;padding:4px 8px}
  .top-bar{flex-wrap:wrap;gap:6px}
  .top-bar .actions{flex-wrap:wrap;gap:5px}
  .stat{min-width:calc(50% - 6px);flex:none}
  .mobile-only{display:block}
  .desktop-only{display:none}
  .filter-row{flex-direction:column;gap:6px}
  .filter-row>*{width:100%}
}
</style>
</head>
<body>

<button id="tbtn" class="sh" onclick="toggleSB()" title="Menu">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div id="sb-ov" onclick="toggleSB(false)"></div>

<div id="sidebar">
  <div style="padding:52px 16px 14px;border-bottom:1px solid #1e293b">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:10px;background:#25D36622;display:flex;align-items:center;justify-content:center;border:1px solid #25D36645;flex-shrink:0">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </div>
      <div><p style="font-weight:700;font-size:13px;color:#f1f5f9;line-height:1.2">NOSH7 CRM</p><p style="font-size:10px;color:#64748b">WhatsApp Leads</p></div>
    </div>
  </div>
  <nav style="padding:10px 8px;flex:1;overflow-y:auto">
    <button class="nav-btn" onclick="go('dashboard')" id="nav-dashboard">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Dashboard
    </button>
    <button class="nav-btn active" onclick="go('leads')" id="nav-leads">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Leads <span class="nbadge" id="lcount">0</span>
    </button>
    <button class="nav-btn" onclick="go('templates')" id="nav-templates">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Templates
    </button>
    <button class="nav-btn" onclick="go('categories')" id="nav-categories">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Categories
    </button>
  </nav>
  <div style="padding:10px 16px;border-top:1px solid #1e293b;display:flex;align-items:center;gap:6px">
    <div id="dbdot" style="width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0"></div>
    <p id="dbst" style="font-size:10px;color:#475569">Connecting...</p>
  </div>
</div>

<main id="main">
  <div style="display:flex;justify-content:center;align-items:center;height:55vh;flex-direction:column;gap:12px">
    <div style="width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%" class="spin"></div>
    <p style="color:var(--muted);font-size:13px">Loading your CRM...</p>
  </div>
</main>
<div id="modal-wrap"></div>
<div id="toast" style="display:none"></div>

<script>
// ── API ──────────────────────────────────────────────────────────────────────
const BASE="https://doesbktbrslcrdhmemhn.supabase.co/rest/v1";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvZXNia3RicnNsY3JkaG1lbWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDY3NTEsImV4cCI6MjA4ODU4Mjc1MX0.cl93JTGAIJI36H68X5WOpZUV8TWea8ItotFwOTQU8NI";
const H={"Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY,"Prefer":"return=representation"};
const api={
  get:async(t,q="")=>{const r=await fetch(`${BASE}/${t}?${q}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json()},
  post:async(t,d)=>{const r=await fetch(`${BASE}/${t}`,{method:"POST",headers:H,body:JSON.stringify(Array.isArray(d)?d:[d])});if(!r.ok)throw new Error(await r.text());return r.json()},
  patch:async(t,d,q)=>{const r=await fetch(`${BASE}/${t}?${q}`,{method:"PATCH",headers:H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()},
  del:async(t,q)=>{const r=await fetch(`${BASE}/${t}?${q}`,{method:"DELETE",headers:H});if(!r.ok)throw new Error(await r.text())}
};

// ── STATE ────────────────────────────────────────────────────────────────────
const S={
  leads:[],templates:[],categories:[],
  tab:"leads",                          // ← Default: leads
  f:{search:"",status:"all",category:"all",sort:"created_date",dir:"desc",page:1,showAll:false},
  sel:new Set(),sbOpen:true
};

const STATUSES=["New","Contacted","Interested","Follow Up","Converted","Not Interested","Lost"];
const SC={New:"#3b82f6",Contacted:"#10b981",Interested:"#8b5cf6","Follow Up":"#f59e0b",Converted:"#22c55e","Not Interested":"#ef4444",Lost:"#94a3b8"};
const PER=20;                           // ← 20 per page default
const DEF_T=[
  {id:"t1",name:"Initial Greeting",message:"Hello {name}! 👋 I came across your inquiry and would love to help. When is a good time to connect?"},
  {id:"t2",name:"Follow Up",message:"Hi {name}, just following up on our last conversation. Any questions? Happy to help! 😊"},
  {id:"t3",name:"New Listing",message:"Hi {name}! 🏠 I have a new listing matching your requirements. Want to schedule a visit?"},
  {id:"t4",name:"Post Meeting",message:"Thank you for your time today, {name}! I'll send the proposal shortly. 🙏"},
];
const DEF_C=["Residential","Commercial","Investment","Rental","Industrial"];

// ── UTILS ────────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().split("T")[0];

// ── PHONE NORMALIZER ─────────────────────────────────────────────────────────
// Strips +91, country code, leading 0, spaces, dashes → stores last 10 digits only
function cleanPhone(raw){
  if(!raw)return"";
  let d=String(raw).replace(/[\s\-\(\)\.]/g,""); // remove spaces, dashes, brackets, dots
  d=d.replace(/^\+91/,"");   // strip +91 prefix
  d=d.replace(/^91(?=\d{10}$)/,"");  // strip 91 if followed by exactly 10 digits
  d=d.replace(/^0/,"");      // strip leading 0
  d=d.replace(/\D/g,"");     // remove any remaining non-digits
  return d.slice(-10);       // keep last 10 digits only
}

// Display phone with +91 prefix
function dispPhone(p){return p?`+91 ${cleanPhone(p)}`:"";}

// ── WEBSITE NORMALIZER ───────────────────────────────────────────────────────
// Strips http://, https://, www. — stores clean domain only (e.g. example.com)
function cleanWebsite(raw){
  if(!raw)return"";
  return String(raw)
    .trim()
    .replace(/^https?:\/\//i,"")   // strip http:// or https://
    .replace(/^www\./i,"")          // strip www.
    .replace(/\/$/,"");             // strip trailing slash
}

// Build full URL for opening
function webURL(w){
  const d=cleanWebsite(w);
  return d?`https://www.${d}`:"";
}

let _t;
function toast(msg,type="ok"){
  const e=$("toast");
  const ok=type==="ok";
  e.style.cssText=`display:flex;position:fixed;bottom:20px;right:20px;z-index:9999;align-items:center;gap:8px;padding:11px 16px;border-radius:11px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.12);animation:toastIn .2s ease;max-width:340px;${ok?"background:#f0fdf4;border:1.5px solid #86efac;color:#166534":"background:#fef2f2;border:1.5px solid #fca5a5;color:#991b1b"}`;
  e.innerHTML=(ok?"✅ ":"⚠️ ")+msg;
  clearTimeout(_t);_t=setTimeout(()=>e.style.display="none",3500);
}
function closeModal(){$("modal-wrap").innerHTML="";}
function modal(html,mw=540){$("modal-wrap").innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:${mw}px">${html}</div></div>`;}
const mX=()=>`<button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:19px;padding:2px 6px">✕</button>`;
function badge(st){const c=SC[st]||"#94a3b8";return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30"><span style="width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0"></span>${st}</span>`;}
function setDB(ok){$("dbdot").style.background=ok?"#22c55e":"#ef4444";$("dbst").textContent=ok?"Supabase live":"DB error";}
function setCount(){const e=$("lcount");if(e)e.textContent=S.leads.length;}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function toggleSB(force){
  const open=force!==undefined?force:!S.sbOpen;
  S.sbOpen=open;
  const sb=$("sidebar"),main=$("main"),btn=$("tbtn"),ov=$("sb-ov");
  if(open){
    sb.classList.remove("hidden");
    if(window.innerWidth>768){main.classList.remove("full");btn.classList.add("sh");}
    else{ov.classList.add("show");}
  }else{
    sb.classList.add("hidden");main.classList.add("full");btn.classList.remove("sh");ov.classList.remove("show");
  }
}
function initSB(){if(window.innerWidth<=768)toggleSB(false);else toggleSB(true);}
window.addEventListener("resize",()=>{if(window.innerWidth>768&&S.sbOpen){$("main").classList.remove("full");$("tbtn").classList.add("sh");}});

function go(tab){
  S.tab=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  $("nav-"+tab)?.classList.add("active");
  if(window.innerWidth<=768)toggleSB(false);
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  initSB();
  try{
    const[leads,tpls,cats]=await Promise.all([
      api.get("leads","order=created_date.desc"),
      api.get("templates"),
      api.get("categories")
    ]);
    S.leads=leads||[];
    S.templates=tpls?.length?tpls:(await api.post("templates",DEF_T),DEF_T);
    S.categories=cats?.length?cats.map(r=>r.name):(await api.post("categories",DEF_C.map(n=>({name:n}))),DEF_C);
    setDB(true);setCount();render();
  }catch(e){
    console.error(e);setDB(false);
    S.templates=DEF_T;S.categories=DEF_C;
    toast("DB error: "+e.message,"err");render();
  }
}

function render(){
  const m=$("main");if(!m)return;
  if(S.tab==="dashboard") m.innerHTML=renderDash();
  if(S.tab==="leads")     m.innerHTML=renderLeads();
  if(S.tab==="templates") m.innerHTML=renderTpls();
  if(S.tab==="categories")m.innerHTML=renderCats();
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDash(){
  const l=S.leads,t=today();
  const st=[
    {lbl:"Total Leads",v:l.length,c:"#22c55e"},
    {lbl:"New",v:l.filter(x=>x.status==="New").length,c:"#3b82f6",cl:true},
    {lbl:"Interested",v:l.filter(x=>x.status==="Interested").length,c:"#8b5cf6"},
    {lbl:"Follow-up Today",v:l.filter(x=>x.follow_up_date===t).length,c:"#f59e0b"},
    {lbl:"Converted",v:l.filter(x=>x.status==="Converted").length,c:"#22c55e"},
  ];
  const dist=STATUSES.map(s=>({s,n:l.filter(x=>x.status===s).length,c:SC[s]})).filter(d=>d.n>0);
  const maxN=Math.max(...dist.map(d=>d.n),1);
  const cats=S.categories.map(c=>({c,n:l.filter(x=>x.category===c).length})).filter(x=>x.n>0);
  const recent=[...l].sort((a,b)=>(b.created_date||"").localeCompare(a.created_date||"")).slice(0,5);
  return `<div class="fade" style="padding-top:6px">
    <div style="margin-bottom:18px"><h1 class="page-title" style="font-size:21px;font-weight:700;margin-top:30px">Dashboard</h1>
    <p style="color:var(--muted);font-size:12px;margin-top:2px">${new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      ${st.map(s=>`<div class="stat ${s.cl?"cl":""}" ${s.cl?`onclick="go('leads')"`:""}><p style="color:var(--muted);font-size:10px;margin-bottom:4px;font-weight:500">${s.lbl}</p><p style="font-size:26px;font-weight:700;color:${s.c};line-height:1">${s.v}</p></div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="card" style="padding:16px">
        <p style="font-weight:600;font-size:12px;color:var(--text);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Status Distribution</p>

// ── LEADS ────────────────────────────────────────────────────────────────────
function filtL(){
  const f=S.f;let r=[...S.leads];
  if(f.search){const q=f.search.toLowerCase();r=r.filter(l=>(l.name||"").toLowerCase().includes(q)||(l.phone||"").includes(q)||(l.email||"").toLowerCase().includes(q)||(l.area||"").toLowerCase().includes(q)||(l.category||"").toLowerCase().includes(q)||(l.notes||"").toLowerCase().includes(q));}
  if(f.status!=="all")r=r.filter(l=>l.status===f.status);
  if(f.category!=="all")r=r.filter(l=>l.category===f.category);
  r.sort((a,b)=>{const av=a[f.sort]||"",bv=b[f.sort]||"";return f.dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);});
  return r;
}

function lFil(k,v){S.f[k]=v;if(k!=="showAll")S.f.page=1;render();}
function lSort(k){if(S.f.sort===k)S.f.dir=S.f.dir==="asc"?"desc":"asc";else{S.f.sort=k;S.f.dir="asc";}render();}
function lPage(p){S.f.page=p;render();}
function togAll(c){const all=filtL();if(c)all.forEach(l=>S.sel.add(l.id));else S.sel.clear();render();}
function toggleOne(id,c){c?S.sel.add(id):S.sel.delete(id);render();}

async function delLead(id){
  if(!confirm("Delete this lead?"))return;
  try{await api.del("leads",`id=eq.${id}`);S.leads=S.leads.filter(l=>l.id!==id);S.sel.delete(id);setCount();toast("Lead deleted");render();}
  catch(e){toast("Delete failed","err");}
}
async function bulkDel(){
  const ids=[...S.sel];if(!ids.length||!confirm(`Delete ${ids.length} leads?`))return;
  try{await api.del("leads",`id=in.(${ids.join(",")})`);S.leads=S.leads.filter(l=>!S.sel.has(l.id));S.sel.clear();setCount();toast(`${ids.length} deleted`);render();}
  catch(e){toast("Error","err");}
}
function exportCSV(){
  const rows=filtL();
  const h=["Name","Phone","Email","Website","Address","Area","Status","Category","Follow Up","Last Contacted","Notes"];
  const csv=[h.join(","),...rows.map(l=>[
    l.name,
    cleanPhone(l.phone),
    l.email,
    cleanWebsite(l.website),
    l.address,l.area,l.status,l.category,l.follow_up_date,l.last_contacted,l.notes
  ].map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="nosh7_leads.csv";a.click();
  toast("CSV exported — phone as 10-digit, website as domain only!");
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function mapCols(headers){
  const m={};
  headers.forEach((h,i)=>{
    const k=h.toLowerCase().replace(/[\s_\-\.\/]/g,"");
    if(m.name===undefined&&(k==="name"||k==="fullname"||k==="leadname"||k==="customer"||k==="clientname"))m.name=i;
    if(m.phone===undefined&&(k.includes("phone")||k.includes("mobile")||k.includes("contact")||k.includes("cell")||k.includes("whatsapp")||k.includes("number")))m.phone=i;
    if(m.email===undefined&&(k.includes("email")||k.includes("mail")))m.email=i;
    if(m.website===undefined&&(k.includes("website")||k.includes("web")||k.includes("url")||k.includes("site")))m.website=i;
    if(m.address===undefined&&(k.includes("address")||k.includes("addr")||k.includes("street")))m.address=i;
    if(m.area===undefined&&(k.includes("area")||k.includes("zone")||k.includes("locality")||k.includes("city")||k.includes("region")||k.includes("location")))m.area=i;
    if(m.category===undefined&&(k.includes("category")||k.includes("cat")||k.includes("type")||k.includes("segment")))m.category=i;
    if(m.status===undefined&&k.includes("status"))m.status=i;
    if(m.notes===undefined&&(k.includes("note")||k.includes("remark")||k.includes("comment")||k.includes("desc")||k.includes("requirement")))m.notes=i;
    if(m.follow_up_date===undefined&&(k.includes("follow")||k.includes("duedate")||k.includes("nextcall")||k.includes("callback")))m.follow_up_date=i;
    if(m.last_contacted===undefined&&(k.includes("last")&&(k.includes("contact")||k.includes("call")||k.includes("spoke"))))m.last_contacted=i;
  });
  return m;
}

function rowToLead(vals,m){
  const g=k=>m[k]!==undefined?(vals[m[k]]||"").toString().trim():"";
  return {
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    name:g("name"),
    phone:cleanPhone(g("phone")),
    email:g("email"),
    website:cleanWebsite(g("website")),
    address:g("address"),area:g("area"),category:g("category")||S.categories[0]||"",
    status:STATUSES.includes(g("status"))?g("status"):"New",
    notes:g("notes"),follow_up_date:g("follow_up_date"),last_contacted:g("last_contacted"),
    created_date:today()
  };
}

    const existMap=new Map(S.leads.map(l=>[(l.phone||"").replace(/\D/g,""),l]));
    const newL=allLeads.filter(l=>!existMap.has(l.phone.replace(/\D/g,"")));

        </div>
        <div class="fg"><label class="label">For leads that already exist (matched by phone number)</label>

        ${!m.name||!m.phone?`<div style="padding:9px 12px;background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;margin-bottom:12px;font-size:12px;color:#991b1b">⚠️ <strong>Name</strong> or <strong>Phone</strong> column not detected. Check your header row.</div>`:""}
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-s btn-sm" onclick="closeModal()">Cancel</button>
          <button class="btn btn-p btn-sm" onclick="doImport()" ${!m.name||!m.phone?"disabled":""}>✓ Import ${allLeads.length} leads</button>
        </div>
      </div>`,580);
  }catch(err){toast("Parse error: "+err.message,"err");}
}

async function doImport(){
  const all=window._imp||[];
  const mode=$("imp-mode")?.value||"skip";
  const existMap=new Map(S.leads.map(l=>[cleanPhone(l.phone),l]));
  const toIns=[],toUpd=[];
  all.forEach(l=>{
    const ph=cleanPhone(l.phone);
    if(existMap.has(ph)){if(mode==="update"||mode==="both")toUpd.push({...l,id:existMap.get(ph).id,created_date:existMap.get(ph).created_date});}
    else{toIns.push(l);}
  });
  try{
    if(toIns.length)await api.post("leads",toIns);
    // Batch update: patch each individually (Supabase REST supports in() for patch too)
    for(const l of toUpd){
      await api.patch("leads",l,`id=eq.${l.id}`);
      S.leads=S.leads.map(x=>x.id===l.id?l:x);
    }
    if(toIns.length)S.leads=[...toIns,...S.leads];
    setCount();toast(`✅ Added ${toIns.length} new · Updated ${toUpd.length}`);closeModal();render();
  }catch(err){toast("Import failed: "+err.message,"err");}
}

function parseFile(file){
  return new Promise((res,rej)=>{
    const ext=file.name.split(".").pop().toLowerCase();
    if(ext==="csv"||ext==="txt"){
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const lines=ev.target.result.split(/\r?\n/).filter(l=>l.trim());
          if(!lines.length){rej(new Error("Empty file"));return;}
          const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
          const rows=lines.slice(1).map(l=>{
            const vals=[];let cur="",inQ=false;
            for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){vals.push(cur.trim());cur="";}else cur+=c;}
            vals.push(cur.trim());
            return vals.map(v=>v.replace(/^"|"$/g,""));
          });
          res({headers,rows});
        }catch(e){rej(e);}
      };
      r.onerror=()=>rej(new Error("Read failed"));r.readAsText(file);
    }else if(["xlsx","xls","ods"].includes(ext)){
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const wb=XLSX.read(ev.target.result,{type:"binary"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(!data.length){rej(new Error("Empty sheet"));return;}
          res({headers:data[0].map(h=>String(h).trim()),rows:data.slice(1).map(r=>r.map(v=>String(v).trim()))});
        }catch(e){rej(e);}
      };
      r.onerror=()=>rej(new Error("Read failed"));r.readAsBinaryString(file);
    }else{rej(new Error("Unsupported file. Use CSV, XLS, XLSX, or ODS. For Apple Numbers: File → Export To → Excel."));}
  });
}

async function saveLF(id){
  const g=i=>$(i)?.value||"";
  const rawPhone=g("lf-phone"), rawWeb=g("lf-website");
  const data={
    name:g("lf-name"),
    phone:cleanPhone(rawPhone),
    email:g("lf-email"),
    website:cleanWebsite(rawWeb),
    address:g("lf-addr"),status:g("lf-status"),category:g("lf-cat"),
    area:g("lf-area"),follow_up_date:g("lf-fu"),notes:g("lf-notes")
  };
  if(!data.name||!data.phone){toast("Name and phone required","err");return;}
  try{
    if(id){await api.patch("leads",data,`id=eq.${id}`);S.leads=S.leads.map(l=>l.id===id?{...l,...data}:l);toast("Lead updated!");}
    else{const n={...data,id:Date.now().toString(),created_date:today()};await api.post("leads",n);S.leads=[n,...S.leads];toast("Lead added!");}
    setCount();closeModal();render();

function refreshBulk(){

  }else if(f==="category"){
    w.innerHTML=`<label class="label">New Category</label><select class="input" id="bk-v"><option value="">— Select —</option>${S.categories.map(c=>`<option>${c}</option>`).join("")}</select>`;
  }else if(f==="follow_up_date"||f==="last_contacted"){
    w.innerHTML=`<label class="label">Date</label><input type="date" class="input" id="bk-v">`;
  }else{
    w.innerHTML=`<label class="label">New Value</label><input class="input" id="bk-v" placeholder="Enter value...">`;
  }
}

async function doBulk(){
  const field=$("bk-f")?.value,val=$("bk-v")?.value;
  if(!val){toast("Enter a value","err");return;}
  const ids=[...S.sel];
  try{
    await api.patch("leads",{[field]:val},`id=in.(${ids.join(",")})`);
    S.leads=S.leads.map(l=>S.sel.has(l.id)?{...l,[field]:val}:l);
    toast(`${ids.length} leads updated`);S.sel.clear();closeModal();render();
  }catch(e){toast("Error: "+e.message,"err");}
}

// ── WHATSAPP ──────────────────────────────────────────────────────────────────
function openWA(id){
  const l=S.leads.find(x=>x.id===id);if(!l)return;
  modal(`
    <div class="mh"><h3 style="font-weight:700;font-size:15px">💬 WhatsApp — ${l.name}</h3>${mX()}</div>
    <div class="mb">
      <div style="margin-bottom:12px;padding:10px 12px;background:var(--surface);border-radius:9px;border:1.5px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="font-size:22px">💬</span>
        <div><p style="font-weight:600;font-size:13px">${l.name}</p><p style="font-size:11px;color:var(--muted);font-family:monospace">+91 ${cleanPhone(l.phone)}</p></div>
      </div>
      <div class="fg"><label class="label">Template (optional)</label>
        <select class="input" onchange="applyTpl(this.value,'${id}')">
          <option value="">— Pick a template —</option>
          ${S.templates.map(t=>`<option value="${t.id}">${t.name}</option>`).join("")}
        </select>
      </div>
      <div class="fg">
        <label class="label">Message</label>
        <textarea class="input" id="wp-m" rows="5" style="resize:vertical" placeholder="Type your message..."></textarea>
        <p style="font-size:10px;color:var(--muted);margin-top:3px" id="wp-c">0 chars</p>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-wa" style="font-size:13px;padding:8px 14px" onclick="sendWA('${id}')">📤 Open WhatsApp</button>
      </div>
    </div>`,460);
  $("wp-m")?.addEventListener("input",function(){const c=$("wp-c");if(c)c.textContent=this.value.length+" chars";});
}
function applyTpl(tid,lid){
  if(!tid)return;
  const t=S.templates.find(x=>x.id===tid),l=S.leads.find(x=>x.id===lid);
  if(t&&l){const e=$("wp-m");if(e){e.value=t.message.replace(/{name}/g,l.name);const c=$("wp-c");if(c)c.textContent=e.value.length+" chars";}}
}
async function sendWA(id){
  const msg=$("wp-m")?.value||"";if(!msg.trim()){toast("Enter a message","err");return;}
  const l=S.leads.find(x=>x.id===id);if(!l)return;
  const ph=cleanPhone(l.phone);
  window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`,"_blank");
  const t=today();
  try{await api.patch("leads",{last_contacted:t},`id=eq.${id}`);S.leads=S.leads.map(l=>l.id===id?{...l,last_contacted:t}:l);}catch(e){}
  closeModal();toast("WhatsApp opened!");render();
}

    </div>

      ${S.templates.map(t=>`<div class="card" style="padding:15px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px">
          <div><p style="font-weight:600;font-size:13px">${t.name}</p><span style="font-size:10px;color:var(--muted)">${t.message.length} chars</span></div>

        </div>
        <p style="font-size:12px;color:var(--muted);line-height:1.65;background:var(--surface);padding:9px 11px;border-radius:7px;border:1.5px solid var(--border)">${t.message}</p>
      </div>`).join("")}

}
function openTF(id){
  const t=id?S.templates.find(x=>x.id===id):null;
  modal(`<div class="mh"><h3 style="font-weight:700;font-size:15px">${t?"✏️ Edit":"➕ New"} Template</h3>${mX()}</div>
    <div class="mb">
      <div class="fg"><label class="label">Name</label><input class="input" id="tf-n" value="${t?.name||""}" placeholder="e.g. Initial Greeting"></div>
      <div class="fg"><label class="label">Message · <span style="color:var(--accent)">Use {name} to personalize</span></label>
        <textarea class="input" id="tf-m" rows="5" style="resize:vertical">${t?.message||""}</textarea></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-p" onclick="saveTF('${id||""}')">✓ Save</button>
      </div>
    </div>`);
}
async function saveTF(id){
  const name=$("tf-n")?.value||"",message=$("tf-m")?.value||"";
  if(!name||!message){toast("Fill all fields","err");return;}
  try{
    if(id){await api.patch("templates",{name,message},`id=eq.${id}`);S.templates=S.templates.map(t=>t.id===id?{...t,name,message}:t);toast("Updated!");}
    else{const n={id:"t"+Date.now(),name,message};await api.post("templates",n);S.templates=[...S.templates,n];toast("Added!");}
    closeModal();render();
  }catch(e){toast("Error: "+e.message,"err");}
}
async function delTpl(id){
  if(!confirm("Delete?"))return;
  try{await api.del("templates",`id=eq.${id}`);S.templates=S.templates.filter(t=>t.id!==id);toast("Deleted");render();}
  catch(e){toast("Error","err");}
}

        const n=S.leads.filter(l=>l.category===cat).length;

          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">

            <div style="display:flex;gap:2px"><button class="ab" onclick="openRC('${cat}')">✏️</button><button class="ab" onclick="delCat('${cat}')">🗑</button></div>
          </div>
          <p style="font-size:11px;color:var(--muted)">${n} lead${n!==1?"s":""}</p>
          <p style="font-size:24px;font-weight:700;color:var(--accent);line-height:1;margin-top:6px">${n}</p>
        </div>`;}).join("")}

}
function openCF(){
  modal(`<div class="mh"><h3 style="font-weight:700;font-size:15px">➕ Add Category</h3>${mX()}</div>
    <div class="mb" style="max-width:400px">
      <div class="fg"><label class="label">Category Name</label><input class="input" id="cn" placeholder="e.g. Luxury Residential"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-p" onclick="saveCat()">Add</button>
      </div>
    </div>`,400);
}
async function saveCat(){
  const name=($("cn")?.value||"").trim();
  if(!name){toast("Enter a name","err");return;}
  if(S.categories.includes(name)){toast("Already exists","err");return;}
  try{await api.post("categories",{name});S.categories=[...S.categories,name];toast("Added!");closeModal();render();}
  catch(e){toast("Error: "+e.message,"err");}
}
function openRC(old){
  modal(`<div class="mh"><h3 style="font-weight:700;font-size:15px">✏️ Rename: ${old}</h3>${mX()}</div>
    <div class="mb" style="max-width:400px">
      <div class="fg"><label class="label">New Name</label><input class="input" id="rn" value="${old}"></div>
      <p style="font-size:11px;color:var(--muted);margin-bottom:12px">⚠️ All leads in <strong>${old}</strong> will be updated.</p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-p" onclick="renameCat('${old}')">✓ Rename</button>
      </div>
    </div>`,400);
}
async function renameCat(old){
  const n=($("rn")?.value||"").trim();
  if(!n||n===old){toast("Enter a different name","err");return;}
  if(S.categories.includes(n)){toast("Name already exists","err");return;}
  try{
    await api.post("categories",{name:n});
    await api.patch("leads",{category:n},`category=eq.${encodeURIComponent(old)}`);
    await api.del("categories",`name=eq.${encodeURIComponent(old)}`);
    S.categories=S.categories.map(c=>c===old?n:c);
    S.leads=S.leads.map(l=>l.category===old?{...l,category:n}:l);
    toast(`Renamed to "${n}"`);closeModal();render();
  }catch(e){toast("Error: "+e.message,"err");}
}
async function delCat(cat){
  const n=S.leads.filter(l=>l.category===cat).length;
  if(n>0){toast(`Can't delete: ${n} leads use this`,"err");return;}
  if(!confirm(`Delete "${cat}"?`))return;
  try{await api.del("categories",`name=eq.${encodeURIComponent(cat)}`);S.categories=S.categories.filter(c=>c!==cat);toast("Deleted");render();}
  catch(e){toast("Error","err");}
}
