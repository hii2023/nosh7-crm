<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NOSH7 CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f0f9ff;--card:#ffffff;--surface:#f8fafc;--border:#e2e8f0;
  --accent:#22c55e;--accent-d:#16a34a;--accent-dim:#dcfce7;
  --wa:#25D366;--wa-d:#128C7E;
  --text:#0f172a;--muted:#64748b;--dim:#94a3b8;
  --red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  --sb-bg:#0f172a;--sb-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
input,select,textarea,button{font-family:'Sora',sans-serif}

/* ── Sidebar ── */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sb-w);background:var(--sb-bg);display:flex;flex-direction:column;z-index:200;transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.15)}
#sidebar.hidden{transform:translateX(calc(-1 * var(--sb-w)))}
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
#main{margin-left:var(--sb-w);transition:margin-left .25s ease;min-height:100vh;padding:22px 24px}
#main.full{margin-left:0}
#toggle-btn{position:fixed;top:14px;left:14px;z-index:300;width:36px;height:36px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(34,197,94,.4);transition:all .2s}
#toggle-btn:hover{background:var(--accent-d)}
#toggle-btn.shifted{left:calc(var(--sb-w) + 10px)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;cursor:pointer;border:none;border-radius:8px;font-family:'Sora',sans-serif;font-weight:500;transition:all .15s;font-size:13px;padding:8px 14px;white-space:nowrap}
.btn-sm{font-size:11px;padding:5px 10px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 6px rgba(34,197,94,.3)}.btn-primary:hover{background:var(--accent-d)}
.btn-secondary{background:var(--card);color:var(--text);border:1.5px solid var(--border)}.btn-secondary:hover{background:var(--surface);border-color:var(--accent)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid transparent}.btn-ghost:hover{background:var(--surface);border-color:var(--border)}
.btn-wa{background:var(--wa);color:#fff}.btn-wa:hover{background:var(--wa-d)}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

/* ── Sidebar nav ── */
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;margin-bottom:3px;border:1px solid transparent;cursor:pointer;font-size:12px;font-weight:400;transition:all .15s;text-align:left;background:transparent;color:#94a3b8}
.nav-btn:hover{background:#1e293b;color:#e2e8f0}
.nav-btn.active{background:#16a34a22;border-color:#22c55e40;color:#4ade80;font-weight:600}
.nav-badge{font-size:10px;padding:1px 6px;border-radius:999px;background:#22c55e20;color:#4ade80;margin-left:auto}

/* ── Inputs ── */
.input{width:100%;padding:8px 12px;border-radius:8px;font-size:13px;background:var(--card);color:var(--text);border:1.5px solid var(--border);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.form-group{margin-bottom:13px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}

/* ── Cards ── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}

/* ── Table ── */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:9px 12px;font-size:10px;color:var(--muted);font-weight:600;user-select:none;white-space:nowrap;background:var(--surface);text-transform:uppercase;letter-spacing:.05em}
.table th.sortable{cursor:pointer}
.table th.sortable:hover{color:var(--accent)}
.table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
.table tr:last-child td{border-bottom:none}
.table tbody tr:hover td{background:#f0fdf4}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:18px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{padding:16px 22px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1}
.modal-body{padding:22px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500}

/* ── Action buttons ── */
.ab{padding:5px;border-radius:6px;background:transparent;border:none;cursor:pointer;display:inline-flex;transition:background .1s;color:var(--muted)}
.ab:hover{background:var(--surface)}

/* ── Stat card ── */
.stat{flex:1;min-width:100px;padding:16px 18px;border-radius:14px;background:var(--card);border:1.5px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s}
.stat.click{cursor:pointer}.stat.click:hover{border-color:var(--accent);box-shadow:0 4px 12px rgba(34,197,94,.15)}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(-10px);opacity:0}to{transform:translateX(0);opacity:1}}
.spin{animation:spin .7s linear infinite}
.fade{animation:fadeIn .2s ease}

/* ── Mobile ── */
@media(max-width:768px){
  #sidebar{width:100% !important;max-width:280px}
  #sidebar.hidden{transform:translateX(-100%)}
  #sb-overlay{display:block}
  #sb-overlay.hidden{display:none}
  #main{margin-left:0 !important;padding:14px}
  #toggle-btn{left:14px !important}
  #toggle-btn.shifted{left:14px !important}
  .grid2{grid-template-columns:1fr}
  .hide-mobile{display:none !important}
  .table th:nth-child(n+6),.table td:nth-child(n+6){display:none}
  .stat{min-width:calc(50% - 6px);flex:none}
  h1{font-size:18px !important}
  .btn{font-size:12px;padding:7px 11px}
  .top-bar{flex-wrap:wrap;gap:8px}
  .top-bar .btn-group{width:100%;justify-content:flex-end}
}
@media(max-width:480px){
  #main{padding:10px}
  .table th:nth-child(n+5),.table td:nth-child(n+5){display:none}
  .stat{min-width:calc(50% - 5px)}
}
</style>
</head>
<body>

<!-- Toggle Button -->
<button id="toggle-btn" class="shifted" onclick="toggleSidebar()" title="Toggle sidebar">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="toggle-icon">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>

<!-- Sidebar Overlay (mobile) -->
<div id="sb-overlay" class="hidden" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div style="padding:56px 16px 16px;border-bottom:1px solid #1e293b">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:11px;background:#25D36625;display:flex;align-items:center;justify-content:center;border:1px solid #25D36650;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </div>

    <button class="nav-btn active" onclick="navigate('dashboard')" id="nav-dashboard">

      Categories

<!-- Main Content -->
<main id="main">
  <div style="display:flex;justify-content:center;align-items:center;height:60vh;flex-direction:column;gap:12px">
    <div style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%" class="spin"></div>
    <p style="color:var(--muted);font-size:13px">Loading your CRM...</p>
  </div>
</main>

<!-- Modal & Toast -->
<div id="modal-wrap"></div>
<div id="toast" style="display:none;position:fixed;bottom:22px;right:22px;z-index:9999;padding:11px 16px;border-radius:11px;font-size:12px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.15);animation:toastIn .2s ease;max-width:340px;align-items:center;gap:8px"></div>

<script>
// ── API ───────────────────────────────────────────────────────────────────────
const BASE = "https://doesbktbrslcrdhmemhn.supabase.co/rest/v1";
const KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvZXNia3RicnNsY3JkaG1lbWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDY3NTEsImV4cCI6MjA4ODU4Mjc1MX0.cl93JTGAIJI36H68X5WOpZUV8TWea8ItotFwOTQU8NI";
const H = {"Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY,"Prefer":"return=representation"};

const api = {
  get: async (t,q="") => { const r=await fetch(`${BASE}/${t}?${q}`,{headers:H}); if(!r.ok)throw new Error(await r.text()); return r.json(); },
  post: async (t,d) => { const r=await fetch(`${BASE}/${t}`,{method:"POST",headers:H,body:JSON.stringify(Array.isArray(d)?d:[d])}); if(!r.ok)throw new Error(await r.text()); return r.json(); },
  patch: async (t,d,q) => { const r=await fetch(`${BASE}/${t}?${q}`,{method:"PATCH",headers:H,body:JSON.stringify(d)}); if(!r.ok)throw new Error(await r.text()); return r.json(); },
  del: async (t,q) => { const r=await fetch(`${BASE}/${t}?${q}`,{method:"DELETE",headers:H}); if(!r.ok)throw new Error(await r.text()); },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  leads:[], templates:[], categories:[], tab:"dashboard",
  f:{search:"",status:"all",category:"all",sort:"created_date",dir:"desc",page:1},
  sel:new Set(), sidebarOpen:true
};

const STATUSES = ["New","Contacted","Interested","Follow Up","Converted","Not Interested","Lost"];
const SC = {New:"#3b82f6",Contacted:"#10b981",Interested:"#8b5cf6","Follow Up":"#f59e0b",Converted:"#22c55e","Not Interested":"#ef4444",Lost:"#94a3b8"};
const PER = 10;
const DEF_T = [
  {id:"t1",name:"Initial Greeting",message:"Hello {name}! 👋 I came across your inquiry and would love to help. When would be a good time to connect?"},
  {id:"t2",name:"Follow Up",message:"Hi {name}, just following up on our last conversation. Any questions? Happy to help! 😊"},
  {id:"t3",name:"New Listing",message:"Hi {name}! 🏠 I have a new listing matching your requirements. Want to schedule a visit?"},
  {id:"t4",name:"Post Meeting",message:"Thank you for your time today, {name}! I'll send the proposal shortly. 🙏"},
];
const DEF_C = ["Residential","Commercial","Investment","Rental","Industrial"];

// ── UTILS ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().split("T")[0];

let _toast;
function toast(msg, type="ok"){
  const e=$("toast");
  const bg=type==="ok"?"background:#f0fdf4;border:1.5px solid #86efac;color:#166534":"background:#fef2f2;border:1.5px solid #fca5a5;color:#991b1b";
  e.style.cssText=`display:flex;position:fixed;bottom:22px;right:22px;z-index:9999;align-items:center;gap:8px;padding:11px 16px;border-radius:11px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.12);animation:toastIn .2s ease;max-width:340px;${bg}`;
  e.innerHTML=(type==="ok"?"✅ ":"⚠️ ")+msg;
  clearTimeout(_toast); _toast=setTimeout(()=>e.style.display="none",3500);
}

function closeModal(){ $("modal-wrap").innerHTML=""; }
function modal(html, mw=540){
  $("modal-wrap").innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:${mw}px">${html}</div></div>`;
}
function mClose(){ return `<button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:2px 6px;border-radius:6px" title="Close">✕</button>`; }

function badge(st){
  const c=SC[st]||"#94a3b8";
  return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30"><span style="width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0"></span>${st}</span>`;
}

function setDbStatus(ok){
  $("db-dot").style.background=ok?"#22c55e":"#ef4444";
  $("db-status").textContent=ok?"Supabase live":"DB error";
}
function setCount(){ const e=$("leads-count"); if(e) e.textContent=S.leads.length; }

function navigate(tab, closeSb=true){
  S.tab=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  $("nav-"+tab)?.classList.add("active");
  // Auto-close sidebar on mobile after navigation
  if(closeSb && window.innerWidth<=768) toggleSidebar(false);
  render();
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function toggleSidebar(forceState){
  const open = forceState !== undefined ? forceState : !S.sidebarOpen;
  S.sidebarOpen = open;
  const sb=$("sidebar"), main=$("main"), btn=$("toggle-btn"), ov=$("sb-overlay");
  if(open){
    sb.classList.remove("hidden");
    if(window.innerWidth>768){ main.classList.remove("full"); btn.classList.add("shifted"); }
    else { ov.classList.remove("hidden"); btn.classList.add("shifted"); }
  } else {
    sb.classList.add("hidden"); main.classList.add("full"); btn.classList.remove("shifted");
    ov.classList.add("hidden");
  }
}

// Init sidebar state based on screen size
function initSidebar(){
  if(window.innerWidth<=768){ toggleSidebar(false); } else { toggleSidebar(true); }
}
window.addEventListener("resize",()=>{ if(window.innerWidth>768 && S.sidebarOpen){ $("main").classList.remove("full"); $("toggle-btn").classList.add("shifted"); } });

// ── COLUMN MAPPER (smart CSV/Excel) ──────────────────────────────────────────
function mapCol(headers){
  const m={};
  headers.forEach((h,i)=>{
    const k=h.toLowerCase().replace(/[\s_\-\.]/g,"");
    if(!m.name      && (k==="name"||k==="fullname"||k==="leadname"||k==="customername")) m.name=i;
    if(!m.phone     && (k.includes("phone")||k.includes("mobile")||k.includes("contact")||k.includes("cell")||k.includes("whatsapp"))) m.phone=i;
    if(!m.email     && (k.includes("email")||k.includes("mail"))) m.email=i;
    if(!m.website   && (k.includes("website")||k.includes("web")||k.includes("url")||k.includes("site"))) m.website=i;
    if(!m.address   && (k.includes("address")||k.includes("addr")||k.includes("street")||k.includes("location"))) m.address=i;
    if(!m.area      && (k.includes("area")||k.includes("zone")||k.includes("locality")||k.includes("region")||k.includes("city"))) m.area=i;
    if(!m.category  && (k.includes("category")||k.includes("cat")||k.includes("type")||k.includes("segment"))) m.category=i;
    if(!m.status    && k.includes("status")) m.status=i;
    if(!m.notes     && (k.includes("note")||k.includes("remark")||k.includes("comment")||k.includes("description"))) m.notes=i;
    if(!m.follow_up_date && (k.includes("follow")||k.includes("followup")||k.includes("fudate")||k.includes("nextcall"))) m.follow_up_date=i;
    if(!m.last_contacted && (k.includes("last")&&(k.includes("contact")||k.includes("called")||k.includes("spoke")))) m.last_contacted=i;
  });
  return m;
}

function rowToLead(vals, m){
  const g=(k)=>(m[k]!==undefined?vals[m[k]]||"":"");
  return {
    id: Date.now().toString()+Math.random().toString(36).slice(2,7),
    name: g("name"), phone: g("phone"), email: g("email"),
    website: g("website"), address: g("address"), area: g("area"),
    category: g("category")||S.categories[0]||"",
    status: g("status")||"New", notes: g("notes"),
    follow_up_date: g("follow_up_date"), last_contacted: g("last_contacted"),
    created_date: today()
  };
}

// Parse CSV or Excel file → array of {headers[], rows[][]}
function parseFile(file){
  return new Promise((resolve, reject)=>{
    const ext = file.name.split(".").pop().toLowerCase();
    if(ext==="csv"||ext==="txt"){
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const lines=ev.target.result.split(/\r?\n/).filter(l=>l.trim());
          if(!lines.length){reject(new Error("Empty file")); return;}
          const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
          const rows=lines.slice(1).map(l=>l.split(",").map(v=>v.replace(/^"|"$/g,"").trim()));
          resolve({headers,rows});
        }catch(e){reject(e);}
      };
      r.onerror=()=>reject(new Error("Read failed"));
      r.readAsText(file);
    } else if(ext==="xlsx"||ext==="xls"||ext==="ods"){
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const wb=XLSX.read(ev.target.result,{type:"binary"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(!data.length){reject(new Error("Empty sheet")); return;}
          const headers=data[0].map(h=>String(h).trim());
          const rows=data.slice(1).map(r=>r.map(v=>String(v).trim()));
          resolve({headers,rows});
        }catch(e){reject(e);}
      };
      r.onerror=()=>reject(new Error("Read failed"));
      r.readAsBinaryString(file);
    } else {
      reject(new Error("Unsupported file type. Use CSV, XLS, or XLSX."));
    }
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  initSidebar();
  try{
    const [leads,tpls,cats]=await Promise.all([
      api.get("leads","order=created_date.desc"),
      api.get("templates"),
      api.get("categories")
    ]);
    S.leads=leads||[];
    S.templates=tpls?.length ? tpls : (await api.post("templates",DEF_T), DEF_T);
    S.categories=cats?.length ? cats.map(r=>r.name) : (await api.post("categories",DEF_C.map(n=>({name:n}))), DEF_C);
    setDbStatus(true); setCount(); render();
  }catch(e){
    console.error(e); setDbStatus(false);
    S.templates=DEF_T; S.categories=DEF_C;
    toast("DB error: "+e.message,"err"); render();

}

// ── LEADS ─────────────────────────────────────────────────────────────────────
function filteredLeads(){
  const f=S.f; let r=[...S.leads];
  if(f.search){ const q=f.search.toLowerCase(); r=r.filter(l=>(l.name||"").toLowerCase().includes(q)||(l.phone||"").includes(q)||(l.email||"").toLowerCase().includes(q)||(l.area||"").toLowerCase().includes(q)||(l.category||"").toLowerCase().includes(q)); }
  if(f.status!=="all") r=r.filter(l=>l.status===f.status);
  if(f.category!=="all") r=r.filter(l=>l.category===f.category);
  r.sort((a,b)=>{ const av=a[f.sort]||"",bv=b[f.sort]||""; return f.dir==="asc"?av.localeCompare(bv):bv.localeCompare(av); });
  return r;
}

function lFilter(k,v){ S.f[k]=v; S.f.page=1; render(); }
function lSort(f){ if(S.f.sort===f) S.f.dir=S.f.dir==="asc"?"desc":"asc"; else{S.f.sort=f;S.f.dir="asc";} render(); }
function lPage(p){ S.f.page=p; render(); }
function toggleAll(checked){ const paged=filteredLeads().slice((S.f.page-1)*PER,S.f.page*PER); if(checked) paged.forEach(l=>S.sel.add(l.id)); else S.sel.clear(); render(); }
function toggleOne(id,checked){ checked?S.sel.add(id):S.sel.delete(id); render(); }

async function deleteLead(id){
  if(!confirm("Delete this lead?")) return;
  try{ await api.del("leads",`id=eq.${id}`); S.leads=S.leads.filter(l=>l.id!==id); S.sel.delete(id); setCount(); toast("Lead deleted"); render(); }
  catch(e){ toast("Delete failed","err"); }
}

async function bulkDelete(){
  const ids=[...S.sel]; if(!ids.length||!confirm(`Delete ${ids.length} leads?`)) return;
  try{ await api.del("leads",`id=in.(${ids.join(",")})`); S.leads=S.leads.filter(l=>!S.sel.has(l.id)); S.sel.clear(); setCount(); toast(`${ids.length} leads deleted`); render(); }
  catch(e){ toast("Error: "+e.message,"err"); }
}

function exportCSV(){
  const rows=filteredLeads();
  const h=["Name","Phone","Email","Website","Address","Area","Status","Category","Follow Up","Last Contacted","Notes"];
  const csv=[h.join(","),...rows.map(l=>[l.name,l.phone,l.email,l.website,l.address,l.area,l.status,l.category,l.follow_up_date,l.last_contacted,l.notes].map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="nosh7_leads.csv"; a.click();
  toast("CSV exported!");
}

async function doImport(data){
  // Use stored data if available (avoids HTML encoding issues)
  const allLeads = window._importData || data;
  const mode=$("imp-mode")?.value||"skip";
  const existing=new Map(S.leads.map(l=>[l.phone?.trim(),l]));

  const toInsert=[], toUpdate=[];
  allLeads.forEach(l=>{
    const ph=l.phone?.trim();
    if(existing.has(ph)){
      if(mode==="update"||mode==="both") toUpdate.push({...existing.get(ph),...l,id:existing.get(ph).id,created_date:existing.get(ph).created_date});
    } else {
      if(mode==="skip"||mode==="both"||mode==="update") toInsert.push(l);
    }
  });
  // If mode is "skip", toUpdate stays empty. If mode is "update", toInsert has non-existing only.

  try{
    if(toInsert.length) await api.post("leads",toInsert);
    for(const l of toUpdate){
      await api.patch("leads",l,`id=eq.${l.id}`);
      S.leads=S.leads.map(x=>x.id===l.id?l:x);
    }
    if(toInsert.length){ S.leads=[...toInsert,...S.leads]; }
    setCount(); toast(`✅ Imported ${toInsert.length} new, updated ${toUpdate.length}`); closeModal(); render();
  }catch(err){ toast("Import failed: "+err.message,"err"); }
}

        <div class="form-group"><label class="label">Follow Up Date</label><input type="date" class="input" id="lf-fu" value="${l?.follow_up_date||""}"></div>
        <div class="form-group" style="grid-column:1/-1"><label class="label">Notes</label>
          <textarea class="input" id="lf-notes" rows="3" style="resize:vertical" placeholder="Requirements, budget...">${l?.notes||""}</textarea></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveLeadForm('${id||""}')">✓ ${l?"Update":"Add"} Lead</button>
      </div>
    </div>`);
}

async function saveLeadForm(id){
  const g=i=>$(i)?.value||"";
  const data={name:g("lf-name"),phone:g("lf-phone"),email:g("lf-email"),website:g("lf-website"),address:g("lf-address"),status:g("lf-status"),category:g("lf-cat"),area:g("lf-area"),follow_up_date:g("lf-fu"),notes:g("lf-notes")};
  if(!data.name||!data.phone){toast("Name and phone required","err");return;}
  try{
    if(id){ await api.patch("leads",data,`id=eq.${id}`); S.leads=S.leads.map(l=>l.id===id?{...l,...data}:l); toast("Lead updated!"); }
    else{ const n={...data,id:Date.now().toString(),created_date:today()}; await api.post("leads",n); S.leads=[n,...S.leads]; toast("Lead added!"); }
    setCount(); closeModal(); render();
  }catch(e){ toast("Error: "+e.message,"err"); }
}

// ── BULK UPDATE MODAL ─────────────────────────────────────────────────────────
function openBulkModal(){
  modal(`
    <div class="modal-header">
      <h3 style="font-weight:700;font-size:15px;color:var(--text)">📝 Bulk Update ${S.sel.size} Leads</h3>
      ${mClose()}
    </div>
    <div class="modal-body" style="max-width:400px">
      <div class="form-group"><label class="label">Field to update</label>
        <select class="input" id="bk-f" onchange="refreshBulkOpts()">
          <option value="status">Status</option>
          <option value="category">Category</option>
          <option value="area">Area</option>
        </select></div>
      <div class="form-group" id="bk-val-wrap"><label class="label">New Value</label>
        <select class="input" id="bk-v"><option value="">— Select —</option>${STATUSES.map(s=>`<option>${s}</option>`).join("")}</select>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="doBulk()">Update ${S.sel.size} Leads</button>
      </div>
    </div>`,400);
}

function refreshBulkOpts(){
  const f=$("bk-f")?.value, w=$("bk-val-wrap"); if(!w) return;
  if(f==="area"){
    w.innerHTML=`<label class="label">New Area</label><input class="input" id="bk-v" placeholder="e.g. Bopal">`;
  } else {
    const opts=f==="status"?STATUSES:S.categories;
    w.innerHTML=`<label class="label">New Value</label><select class="input" id="bk-v"><option value="">— Select —</option>${opts.map(v=>`<option>${v}</option>`).join("")}</select>`;
  }
}

async function doBulk(){
  const field=$("bk-f")?.value, val=$("bk-v")?.value;
  if(!val){toast("Enter a value","err");return;}
  const ids=[...S.sel];
  try{
    await api.patch("leads",{[field]:val},`id=in.(${ids.join(",")})`);
    S.leads=S.leads.map(l=>S.sel.has(l.id)?{...l,[field]:val}:l);
    toast(`${ids.length} leads updated`); S.sel.clear(); closeModal(); render();
  }catch(e){ toast("Error: "+e.message,"err"); }
}

// ── WHATSAPP ──────────────────────────────────────────────────────────────────
function openWpModal(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  modal(`
    <div class="modal-header">
      <h3 style="font-weight:700;font-size:15px;color:var(--text)">💬 Send WhatsApp</h3>
      ${mClose()}
    </div>
    <div class="modal-body">
      <div style="margin-bottom:14px;padding:12px;background:var(--surface);border-radius:10px;border:1.5px solid var(--border);display:flex;align-items:center;gap:10px">
        <div style="width:38px;height:38px;border-radius:50%;background:#25D36620;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px">💬</div>
        <div><p style="font-weight:600;font-size:13px;color:var(--text)">${l.name}</p><p style="font-size:11px;color:var(--muted);font-family:monospace">+91 ${l.phone}</p></div>
      </div>
      <div class="form-group"><label class="label">Template (optional)</label>
        <select class="input" onchange="applyTpl(this.value,'${id}')">
          <option value="">— Pick a template —</option>
          ${S.templates.map(t=>`<option value="${t.id}">${t.name}</option>`).join("")}
        </select></div>
      <div class="form-group">
        <label class="label">Message</label>
        <textarea class="input" id="wp-msg" rows="5" style="resize:vertical" placeholder="Type your message..."></textarea>
        <p style="font-size:10px;color:var(--muted);margin-top:3px" id="wp-cc">0 chars</p>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-wa" onclick="sendWp('${id}')">📤 Open WhatsApp</button>
      </div>
    </div>`,460);
  $("wp-msg")?.addEventListener("input",function(){const e=$("wp-cc");if(e)e.textContent=this.value.length+" chars";});
}

function applyTpl(tid,lid){
  if(!tid) return;
  const t=S.templates.find(x=>x.id===tid), l=S.leads.find(x=>x.id===lid);
  if(t&&l){const e=$("wp-msg");if(e){e.value=t.message.replace(/{name}/g,l.name);const c=$("wp-cc");if(c)c.textContent=e.value.length+" chars";}}
}

async function sendWp(id){
  const msg=$("wp-msg")?.value||""; if(!msg.trim()){toast("Enter a message","err");return;}
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  const ph=(l.phone||"").replace(/\D/g,"");
  window.open(`https://wa.me/${ph.length===10?"91"+ph:ph}?text=${encodeURIComponent(msg)}`,"_blank");
  const t=today();
  try{ await api.patch("leads",{last_contacted:t},`id=eq.${id}`); S.leads=S.leads.map(l=>l.id===id?{...l,last_contacted:t}:l); }catch(e){}
  closeModal(); toast("WhatsApp opened!"); render();
}

// ── TEMPLATES ─────────────────────────────────────────────────────────────────
function renderTpls(){
  return `<div class="fade" style="padding-top:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      <div><h1 style="font-size:22px;font-weight:700;color:var(--text)">Templates</h1><p style="color:var(--muted);font-size:12px">Saved WhatsApp messages with {name} personalization</p></div>
      <button class="btn btn-primary btn-sm" onclick="openTplForm()">＋ New Template</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px">
      ${S.templates.map(t=>`<div class="card" style="padding:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div><p style="font-weight:600;font-size:13px;color:var(--text)">${t.name}</p><span style="font-size:10px;color:var(--muted)">${t.message.length} chars</span></div>
          <div style="display:flex;gap:4px">
            <button class="ab" title="Edit" onclick="openTplForm('${t.id}')">✏️</button>
            <button class="ab" title="Delete" onclick="deleteTpl('${t.id}')">🗑</button>
          </div>
        </div>
        <p style="font-size:12px;color:var(--muted);line-height:1.65;background:var(--surface);padding:10px 12px;border-radius:8px;border:1.5px solid var(--border)">${t.message}</p>
      </div>`).join("")}
    </div>
  </div>`;
}

function openTplForm(id){
  const t=id?S.templates.find(x=>x.id===id):null;
  modal(`
    <div class="modal-header">
      <h3 style="font-weight:700;font-size:15px;color:var(--text)">${t?"✏️ Edit Template":"➕ New Template"}</h3>
      ${mClose()}
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="label">Template Name</label><input class="input" id="tf-n" value="${t?.name||""}" placeholder="e.g. Initial Greeting"></div>
      <div class="form-group">
        <label class="label">Message · <span style="color:var(--accent)">Use {name} to personalize</span></label>
        <textarea class="input" id="tf-m" rows="5" style="resize:vertical" placeholder="Hello {name}! ...">${t?.message||""}</textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTpl('${id||""}')">✓ Save</button>
      </div>
    </div>`);
}

async function saveTpl(id){
  const name=$("tf-n")?.value||"", message=$("tf-m")?.value||"";
  if(!name||!message){toast("Fill all fields","err");return;}
  try{
    if(id){ await api.patch("templates",{name,message},`id=eq.${id}`); S.templates=S.templates.map(t=>t.id===id?{...t,name,message}:t); toast("Updated!"); }
    else{ const n={id:"t"+Date.now(),name,message}; await api.post("templates",n); S.templates=[...S.templates,n]; toast("Template added!"); }
    closeModal(); render();
  }catch(e){ toast("Error: "+e.message,"err"); }
}

async function deleteTpl(id){
  if(!confirm("Delete this template?")) return;
  try{ await api.del("templates",`id=eq.${id}`); S.templates=S.templates.filter(t=>t.id!==id); toast("Deleted"); render(); }
  catch(e){ toast("Error","err"); }
}

// ── CATEGORIES ─────────────────────────────────────────────────────────────────
function renderCats(){
  return `<div class="fade" style="padding-top:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      <div><h1 style="font-size:22px;font-weight:700;color:var(--text)">Categories</h1><p style="color:var(--muted);font-size:12px">Organize and rename lead categories</p></div>
      <button class="btn btn-primary btn-sm" onclick="openCatForm()">＋ Add Category</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:11px">
      ${S.categories.map(cat=>{
        const n=S.leads.filter(l=>l.category===cat).length;
        return `<div class="card" style="padding:16px 18px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <p style="font-weight:700;font-size:15px;color:var(--text)">${cat}</p>
            <div style="display:flex;gap:3px">
              <button class="ab" title="Rename" onclick="openRenameCat('${cat}')">✏️</button>
              <button class="ab" title="Delete" onclick="deleteCat('${cat}')">🗑</button>
            </div>
          </div>
          <p style="font-size:11px;color:var(--muted)">${n} lead${n!==1?"s":""}</p>
          <p style="font-size:26px;font-weight:700;color:var(--accent);margin-top:6px;line-height:1">${n}</p>
        </div>`;}).join("")}
    </div>
  </div>`;
}

function openCatForm(){
  modal(`
    <div class="modal-header">
      <h3 style="font-weight:700;font-size:15px;color:var(--text)">➕ Add Category</h3>
      ${mClose()}
    </div>
    <div class="modal-body" style="max-width:400px">
      <div class="form-group"><label class="label">Category Name</label><input class="input" id="cat-n" placeholder="e.g. Luxury Residential"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCat()">Add</button>
      </div>
    </div>`,400);
}

async function saveCat(){
  const name=($("cat-n")?.value||"").trim();
  if(!name){toast("Enter a name","err");return;}
  if(S.categories.includes(name)){toast("Already exists","err");return;}
  try{ await api.post("categories",{name}); S.categories=[...S.categories,name]; toast("Category added!"); closeModal(); render(); }
  catch(e){ toast("Error: "+e.message,"err"); }
}

function openRenameCat(oldName){
  modal(`
    <div class="modal-header">
      <h3 style="font-weight:700;font-size:15px;color:var(--text)">✏️ Rename Category</h3>
      ${mClose()}
    </div>
    <div class="modal-body" style="max-width:400px">
      <div class="form-group">
        <label class="label">Current name</label>
        <input class="input" value="${oldName}" disabled style="opacity:.6">
      </div>
      <div class="form-group">
        <label class="label">New name</label>
        <input class="input" id="rename-n" value="${oldName}" placeholder="New category name">
      </div>
      <p style="font-size:11px;color:var(--muted);margin-bottom:14px">⚠️ All leads using <strong>${oldName}</strong> will be updated to the new name.</p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="renameCat('${oldName}')">✓ Rename</button>
      </div>
    </div>`,400);
}

async function renameCat(oldName){
  const newName=($("rename-n")?.value||"").trim();
  if(!newName||newName===oldName){toast("Enter a different name","err");return;}
  if(S.categories.includes(newName)){toast("Name already exists","err");return;}
  try{
    // Insert new, update leads, delete old
    await api.post("categories",{name:newName});
    await api.patch("leads",{category:newName},`category=eq.${encodeURIComponent(oldName)}`);
    await api.del("categories",`name=eq.${encodeURIComponent(oldName)}`);
    S.categories=S.categories.map(c=>c===oldName?newName:c);
    S.leads=S.leads.map(l=>l.category===oldName?{...l,category:newName}:l);
    toast(`Renamed to "${newName}"`); closeModal(); render();
  }catch(e){ toast("Error: "+e.message,"err"); }
}

async function deleteCat(cat){
  const n=S.leads.filter(l=>l.category===cat).length;
  if(n>0){toast(`Can't delete: ${n} leads use this category`,"err");return;}
  if(!confirm(`Delete "${cat}"?`)) return;
  try{ await api.del("categories",`name=eq.${encodeURIComponent(cat)}`); S.categories=S.categories.filter(c=>c!==cat); toast("Deleted"); render(); }
  catch(e){ toast("Error","err"); }
}

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
