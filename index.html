<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NOSH7 CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#07100a;color:#d4edd8;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#07100a}
::-webkit-scrollbar-thumb{background:#1a3020;border-radius:3px}
input,select,textarea,button{font-family:'Sora',sans-serif}
select option{background:#0d1a0f;color:#d4edd8}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.spin{animation:spin .7s linear infinite}
.fade{animation:fadeIn .25s ease}
.sidebar-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;margin-bottom:2px;border:1px solid transparent;cursor:pointer;font-size:12px;font-weight:400;transition:all .15s;text-align:left;background:transparent;color:#6b9b6b}
.sidebar-btn:hover{background:#122015;color:#d4edd8}
.sidebar-btn.active{background:#0e2a18;border-color:#25D36640;color:#25D366;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:5px;cursor:pointer;border:none;border-radius:7px;font-family:'Sora',sans-serif;font-weight:500;transition:all .15s;font-size:13px;padding:8px 14px}
.btn-sm{font-size:12px;padding:5px 11px}
.btn-primary{background:#25D366;color:#fff}.btn-primary:hover{background:#1fbd58}
.btn-secondary{background:#0d1a0f;color:#d4edd8;border:1px solid #1a3020}.btn-secondary:hover{background:#122015}
.btn-danger{background:#e74c3c;color:#fff}.btn-danger:hover{background:#c0392b}
.btn-ghost{background:transparent;color:#6b9b6b;border:1px solid transparent}.btn-ghost:hover{background:#122015;border-color:#1a3020}
.btn-teal{background:#128C7E;color:#fff}.btn-teal:hover{background:#0d6e64}
.btn:disabled{opacity:.5;cursor:not-allowed}
.input{width:100%;padding:8px 11px;border-radius:7px;font-size:13px;background:#122015;color:#d4edd8;border:1px solid #1a3020;outline:none}
.input:focus{border-color:#25D36660}
.label{display:block;font-size:11px;color:#6b9b6b;margin-bottom:4px}
.card{background:#0d1a0f;border:1px solid #1a3020;border-radius:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.modal{background:#0d1a0f;border:1px solid #234028;border-radius:16px;width:100%;max-height:92vh;overflow:auto}
.modal-header{padding:16px 22px;border-bottom:1px solid #1a3020;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#0d1a0f;z-index:1}
.modal-body{padding:22px}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:8px 12px;font-size:10px;color:#6b9b6b;font-weight:500;user-select:none;white-space:nowrap;background:#122015}
.table th.sortable{cursor:pointer}
.table td{padding:8px 12px;border-bottom:1px solid #1a302018;font-size:13px}
.table tr:last-child td{border-bottom:none}
.table tbody tr:hover td{background:#12201530}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500}
.action-btn{padding:5px;border-radius:6px;background:transparent;border:none;cursor:pointer;display:inline-flex;transition:background .1s}
.action-btn:hover{background:#ffffff14}
.form-group{margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.stat-card{flex:1;min-width:110px;padding:16px 20px;border-radius:14px;transition:all .2s;border:1px solid #1a3020;background:#0d1a0f}
.stat-card.clickable{cursor:pointer}
.stat-card.clickable:hover{background:#122015;border-color:#25D36640}
</style>
</head>
<body>
<div style="display:flex;min-height:100vh">

  <!-- Sidebar -->
  <div style="position:fixed;left:0;top:0;bottom:0;width:200px;background:#0d1a0f;border-right:1px solid #1a3020;display:flex;flex-direction:column;z-index:100">
    <div style="padding:20px 16px 16px;border-bottom:1px solid #1a3020">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;border-radius:10px;background:#25D36620;display:flex;align-items:center;justify-content:center;border:1px solid #25D36640">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </div>
        <div>
          <p style="font-weight:700;font-size:13px;color:#d4edd8;line-height:1.2">NOSH7 CRM</p>
          <p style="font-size:10px;color:#6b9b6b">WhatsApp Leads</p>
        </div>
      </div>
    </div>
    <nav style="padding:10px 8px;flex:1">
      <button class="sidebar-btn active" onclick="navigate('dashboard')" id="nav-dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </button>
      <button class="sidebar-btn" onclick="navigate('leads')" id="nav-leads">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Leads <span id="leads-count" style="font-size:10px;padding:1px 6px;border-radius:999px;background:#25D36620;color:#25D366;margin-left:auto"></span>
      </button>
      <button class="sidebar-btn" onclick="navigate('templates')" id="nav-templates">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Templates
      </button>
      <button class="sidebar-btn" onclick="navigate('categories')" id="nav-categories">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Categories
      </button>
    </nav>
    <div style="padding:12px 16px;border-top:1px solid #1a3020;display:flex;align-items:center;gap:6px">
      <div id="db-dot" style="width:6px;height:6px;border-radius:50%;background:#fbbf24"></div>
      <p id="db-status" style="font-size:10px;color:#3a6040">Connecting...</p>
    </div>
  </div>

  <!-- Main -->
  <main id="main" style="margin-left:200px;flex:1;padding:26px 28px;min-height:100vh">
    <div style="display:flex;justify-content:center;align-items:center;height:60vh">
      <div style="text-align:center">
        <div style="width:28px;height:28px;border:2px solid #1a3020;border-top-color:#25D366;border-radius:50%;margin:0 auto 12px" class="spin"></div>
        <p style="color:#6b9b6b;font-size:13px">Loading your data...</p>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal-wrap"></div>
<!-- Toast -->
<div id="toast" style="display:none;position:fixed;bottom:22px;right:22px;z-index:2000;padding:11px 16px;border-radius:10px;font-size:12px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:toastIn .2s ease;max-width:340px;display:none;align-items:center;gap:8px"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const URL_BASE = "https://doesbktbrslcrdhmemhn.supabase.co/rest/v1";
const API_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvZXNia3RicnNsY3JkaG1lbWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDY3NTEsImV4cCI6MjA4ODU4Mjc1MX0.cl93JTGAIJI36H68X5WOpZUV8TWea8ItotFwOTQU8NI";

const HDR = {
  "Content-Type": "application/json",
  "apikey": API_KEY,
  "Authorization": "Bearer " + API_KEY,
  "Prefer": "return=representation"
};

// Direct REST API — no SDK, no library
async function dbGet(table, params = "") {
  const r = await fetch(`${URL_BASE}/${table}?${params}`, { headers: HDR });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbInsert(table, data) {
  const r = await fetch(`${URL_BASE}/${table}`, {
    method: "POST", headers: HDR, body: JSON.stringify(Array.isArray(data) ? data : [data])
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbUpdate(table, data, match) {
  const params = Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join("&");
  const r = await fetch(`${URL_BASE}/${table}?${params}`, {
    method: "PATCH", headers: HDR, body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbDelete(table, match) {
  const params = Array.isArray(match)
    ? `id=in.(${match.join(",")})`
    : Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join("&");
  const r = await fetch(`${URL_BASE}/${table}?${params}`, { method: "DELETE", headers: HDR });
  if (!r.ok) throw new Error(await r.text());
}

// ── STATE ────────────────────────────────────────────────────────────────────
const S = {
  leads: [], templates: [], categories: [], tab: "dashboard",
  filter: { search:"", status:"all", category:"all", sort:"created_date", dir:"desc", page:1 },
  sel: new Set()
};

const STATUSES = ["New","Contacted","Interested","Follow Up","Converted","Not Interested","Lost"];
const SC = { New:"#60a5fa", Contacted:"#34d399", Interested:"#a78bfa", "Follow Up":"#fbbf24", Converted:"#4ade80", "Not Interested":"#f87171", Lost:"#6b7280" };
const PER = 10;
const DEF_TPL = [
  {id:"t1", name:"Initial Greeting", message:"Hello {name}! 👋 I came across your inquiry and would love to help you find the perfect property. When would be a good time to connect?"},
  {id:"t2", name:"Follow Up", message:"Hi {name}, just following up on our last conversation. Any questions? Happy to help! 😊"},
  {id:"t3", name:"New Listing", message:"Hi {name}! 🏠 I have an exciting new listing matching your requirements. Want to schedule a visit?"},
  {id:"t4", name:"Post Meeting", message:"Thank you for your time today, {name}! Wonderful meeting you. Sending the proposal shortly. 🙏"},
];
const DEF_CAT = ["Residential","Commercial","Investment","Rental","Industrial"];

// ── HELPERS ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().split("T")[0];

let toastTimer;
function toast(msg, type = "ok") {
  const el = $("toast");
  el.style.cssText = `display:flex;position:fixed;bottom:22px;right:22px;z-index:2000;align-items:center;gap:8px;padding:11px 16px;border-radius:10px;font-size:12px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:toastIn .2s ease;max-width:340px;${type==="err"?"background:#2a0a0a;border:1px solid #f8717160;color:#f87171":"background:#0e2a18;border:1px solid #25D36660;color:#25D366"}`;
  el.innerHTML = (type==="err" ? "⚠ " : "✓ ") + msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display="none"; }, 3500);
}

function badge(status) {
  const c = SC[status] || "#6b7280";
  return `<span class="status-badge" style="background:${c}18;color:${c};border:1px solid ${c}30"><span style="width:5px;height:5px;border-radius:50%;background:${c}"></span>${status}</span>`;
}

function closeModal() { $("modal-wrap").innerHTML = ""; }

function modal(inner, maxW = 520) {
  $("modal-wrap").innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:${maxW}px">${inner}</div></div>`;
}

function modalClose() {
  return `<button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#6b9b6b;padding:4px">✕</button>`;
}

function setDbStatus(ok) {
  $("db-dot").style.background = ok ? "#25D366" : "#f87171";
  $("db-status").textContent = ok ? "Supabase live" : "DB error";
}

function setLeadsCount() {
  const el = $("leads-count");
  if (el) el.textContent = S.leads.length;
}

function navigate(tab) {
  S.tab = tab;
  document.querySelectorAll(".sidebar-btn").forEach(b => b.classList.remove("active"));
  $("nav-" + tab)?.classList.add("active");
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [leads, tpls, cats] = await Promise.all([
      dbGet("leads", "order=created_date.desc"),
      dbGet("templates"),
      dbGet("categories")
    ]);
    S.leads = leads;

    if (!tpls.length) { await dbInsert("templates", DEF_TPL); S.templates = DEF_TPL; }
    else S.templates = tpls;

    if (!cats.length) {
      await dbInsert("categories", DEF_CAT.map(n => ({name:n})));
      S.categories = DEF_CAT;
    } else S.categories = cats.map(r => r.name);

    setDbStatus(true);
    setLeadsCount();
    render();
  } catch(e) {
    console.error(e);
    setDbStatus(false);
    S.templates = DEF_TPL; S.categories = DEF_CAT;
    toast("DB error: " + e.message, "err");
    render();
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const m = $("main");
  if (!m) return;
  if (S.tab === "dashboard")  m.innerHTML = renderDash();
  if (S.tab === "leads")      m.innerHTML = renderLeads();
  if (S.tab === "templates")  m.innerHTML = renderTpls();
  if (S.tab === "categories") m.innerHTML = renderCats();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash() {
  const l = S.leads, t = today();
  const stats = [
    {label:"Total Leads", val:l.length, color:"#25D366"},
    {label:"New", val:l.filter(x=>x.status==="New").length, color:"#60a5fa", click:true},
    {label:"Interested", val:l.filter(x=>x.status==="Interested").length, color:"#a78bfa"},
    {label:"Follow Up Today", val:l.filter(x=>x.follow_up_date===t).length, color:"#fbbf24"},
    {label:"Converted", val:l.filter(x=>x.status==="Converted").length, color:"#4ade80"},
  ];
  const dist = STATUSES.map(s=>({s,n:l.filter(x=>x.status===s).length,c:SC[s]})).filter(d=>d.n>0);
  const maxN = Math.max(...dist.map(d=>d.n), 1);
  const cats = S.categories.map(c=>({c,n:l.filter(x=>x.category===c).length})).filter(x=>x.n>0);
  const recent = [...l].sort((a,b)=>(b.created_date||"").localeCompare(a.created_date||"")).slice(0,5);

  return `<div class="fade">
    <div style="margin-bottom:22px">
      <h1 style="font-size:22px;font-weight:700;color:#d4edd8">Dashboard</h1>
      <p style="color:#6b9b6b;font-size:12px;margin-top:2px">${new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
      ${stats.map(s=>`<div class="stat-card ${s.click?"clickable":""}" ${s.click?'onclick="navigate(\'leads\')"':""}>
        <p style="color:#6b9b6b;font-size:11px;margin-bottom:6px">${s.label}</p>
        <p style="font-size:28px;font-weight:700;color:${s.color};line-height:1">${s.val}</p>
      </div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
      <div class="card" style="padding:18px">
        <p style="font-weight:600;font-size:13px;color:#d4edd8;margin-bottom:14px">Status Distribution</p>
        ${dist.length ? dist.map(({s,n,c})=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:11px;color:#6b9b6b">${s}</span>
              <span style="font-size:11px;font-weight:600;color:${c}">${n}</span>
            </div>
            <div style="height:5px;background:#122015;border-radius:999px">
              <div style="height:100%;width:${(n/maxN)*100}%;background:${c};border-radius:999px"></div>
            </div>
          </div>`).join("") : '<p style="color:#6b9b6b;font-size:12px">No data yet</p>'}
      </div>
      <div class="card" style="padding:18px">
        <p style="font-weight:600;font-size:13px;color:#d4edd8;margin-bottom:14px">Category Breakdown</p>
        ${cats.length ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${cats.map(({c,n})=>`
          <div style="background:#122015;border-radius:9px;padding:12px 13px;border:1px solid #1a3020">
            <p style="font-size:22px;font-weight:700;color:#25D366;line-height:1">${n}</p>
            <p style="font-size:11px;color:#6b9b6b;margin-top:3px">${c}</p>
          </div>`).join("")}</div>` : '<p style="color:#6b9b6b;font-size:12px">No data yet</p>'}
      </div>
    </div>
    ${recent.length ? `<div class="card" style="padding:18px">
      <p style="font-weight:600;font-size:13px;color:#d4edd8;margin-bottom:14px">Recently Added</p>
      <table class="table"><thead><tr>
        <th>Name</th><th>Phone</th><th>Status</th><th>Category</th><th>Date</th>
      </tr></thead><tbody>
      ${recent.map(l=>`<tr>
        <td style="font-weight:500;color:#d4edd8">${l.name}</td>
        <td style="font-family:monospace;color:#6b9b6b">${l.phone}</td>
        <td>${badge(l.status)}</td>
        <td style="color:#6b9b6b">${l.category||"—"}</td>
        <td style="color:#6b9b6b">${l.created_date||"—"}</td>
      </tr>`).join("")}
      </tbody></table>
    </div>` : ""}
  </div>`;
}

// ── LEADS ─────────────────────────────────────────────────────────────────────
function filtered() {
  const f = S.filter;
  let r = [...S.leads];
  if (f.search) {
    const q = f.search.toLowerCase();
    r = r.filter(l => (l.name||"").toLowerCase().includes(q)||(l.phone||"").includes(q)||(l.email||"").toLowerCase().includes(q)||(l.area||"").toLowerCase().includes(q));
  }
  if (f.status !== "all") r = r.filter(l => l.status === f.status);
  if (f.category !== "all") r = r.filter(l => l.category === f.category);
  r.sort((a,b) => {
    const av = a[f.sort]||"", bv = b[f.sort]||"";
    return f.dir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  return r;
}

function renderLeads() {
  const f = S.filter;
  const rows = filtered();
  const pages = Math.ceil(rows.length / PER) || 1;
  const paged = rows.slice((f.page-1)*PER, f.page*PER);
  const selN = S.sel.size;
  const arr = field => f.sort===field ? (f.dir==="asc"?"▲":"▼") : "";
  const allChk = selN === paged.length && paged.length > 0;

  const pgBtns = () => {
    let h = `<button class="btn btn-secondary btn-sm" onclick="lPage(${Math.max(1,f.page-1)})" ${f.page===1?"disabled":""}>‹</button>`;
    const s = Math.max(1, Math.min(pages-4, f.page-2));
    for (let i=0; i<Math.min(5,pages); i++) {
      const p = s+i;
      h += `<button class="btn ${p===f.page?"btn-primary":"btn-secondary"} btn-sm" onclick="lPage(${p})">${p}</button>`;
    }
    h += `<button class="btn btn-secondary btn-sm" onclick="lPage(${Math.min(pages,f.page+1)})" ${f.page===pages?"disabled":""}>›</button>`;
    return h;
  };

  return `<div class="fade">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px">
      <div>
        <h1 style="font-size:22px;font-weight:700;color:#d4edd8">Leads</h1>
        <p style="color:#6b9b6b;font-size:12px">${rows.length} leads${f.search||f.status!=="all"||f.category!=="all"?" (filtered)":""}</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <label class="btn btn-secondary btn-sm" style="cursor:pointer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          Import CSV <input type="file" accept=".csv" onchange="importCSV(event)" style="display:none">
        </label>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">

function lFilter(k, v) { S.filter[k] = v; S.filter.page = 1; render(); }
function lSort(field) {
  if (S.filter.sort === field) S.filter.dir = S.filter.dir==="asc"?"desc":"asc";
  else { S.filter.sort = field; S.filter.dir = "asc"; }
  render();
}
function lPage(p) { S.filter.page = p; render(); }
function toggleAll(checked) {
  const paged = filtered().slice((S.filter.page-1)*PER, S.filter.page*PER);
  if (checked) paged.forEach(l => S.sel.add(l.id)); else S.sel.clear();
  render();
}
function toggleOne(id, checked) { checked ? S.sel.add(id) : S.sel.delete(id); render(); }

async function deleteLead(id) {
  if (!confirm("Delete this lead?")) return;
  try {
    await dbDelete("leads", {id});
    S.leads = S.leads.filter(l => l.id !== id);
    S.sel.delete(id);
    setLeadsCount(); toast("Lead deleted"); render();
  } catch(e) { toast("Delete failed: "+e.message, "err"); }
}

async function bulkDelete() {
  const ids = [...S.sel];
  if (!ids.length || !confirm(`Delete ${ids.length} leads?`)) return;
  try {
    await dbDelete("leads", ids);
    S.leads = S.leads.filter(l => !S.sel.has(l.id));
    S.sel.clear(); setLeadsCount(); toast(`${ids.length} leads deleted`); render();
  } catch(e) { toast("Error: "+e.message, "err"); }
}

function exportCSV() {
  const rows = filtered();
  const h = ["Name","Phone","Email","Status","Category","Area","Follow Up","Last Contacted","Notes"];
  const csv = [h.join(","), ...rows.map(l=>[l.name,l.phone,l.email,l.status,l.category,l.area,l.follow_up_date,l.last_contacted,l.notes].map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","))].join("\n");
  Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv"})),download:"nosh7_leads.csv"}).click();
  toast("CSV exported!");
}

async function importCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const lines = ev.target.result.split("\n").filter(Boolean);
      const headers = lines[0].split(",").map(h=>h.replace(/"/g,"").trim().toLowerCase());
      const newLeads = lines.slice(1).map(line => {
        const vals = line.split(",").map(v=>v.replace(/^"|"$/g,"").trim());
        const o = {}; headers.forEach((h,i) => o[h] = vals[i]||"");
        return {id:Date.now()+""+Math.random(), name:o.name||"", phone:o.phone||"", email:o.email||"", status:o.status||"New", category:o.category||S.categories[0]||"", area:o.area||"", notes:o.notes||"", follow_up_date:o["follow up"]||"", last_contacted:o["last contacted"]||"", website:o.website||"", address:o.address||"", created_date:today()};
      }).filter(l => l.name && l.phone);
      if (!newLeads.length) { toast("No valid rows found","err"); return; }
      await dbInsert("leads", newLeads);
      S.leads = [...newLeads, ...S.leads];
      setLeadsCount(); toast(`Imported ${newLeads.length} leads!`); render();
    } catch(err) { toast("Import failed: "+err.message, "err"); }
    e.target.value = "";
  };
  reader.readAsText(file);
}

async function saveLeadForm(id) {
  const g = i => $(i)?.value||"";
  const data = {name:g("lf-name"),phone:g("lf-phone"),email:g("lf-email"),website:g("lf-website"),address:g("lf-address"),status:g("lf-status"),category:g("lf-cat"),area:g("lf-area"),follow_up_date:g("lf-fu"),notes:g("lf-notes")};
  if (!data.name||!data.phone) { toast("Name and phone required","err"); return; }
  try {
    if (id) {
      await dbUpdate("leads", data, {id});
      S.leads = S.leads.map(l => l.id===id ? {...l,...data} : l);
      toast("Lead updated!");
    } else {
      const newL = {...data, id:Date.now().toString(), created_date:today()};
      await dbInsert("leads", newL);
      S.leads = [newL, ...S.leads];
      toast("Lead added!");

        </select>
      </div>
      <div class="form-group">
        <label class="label">Message</label>
        <textarea class="input" id="wp-msg" rows="5" style="resize:vertical" placeholder="Type your message..."></textarea>

      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="sendWp('${id}')">📤 Open WhatsApp</button>
      </div>
    </div>`, 460);
  $("wp-msg")?.addEventListener("input", function(){ const el=$("wp-cc"); if(el) el.textContent=this.value.length+" chars"; });
}

function applyTpl(tplId, leadId) {
  if (!tplId) return;
  const t = S.templates.find(x=>x.id===tplId);
  const l = S.leads.find(x=>x.id===leadId);
  if (t && l) {
    const el = $("wp-msg");
    if (el) { el.value = t.message.replace(/{name}/g, l.name); const cc=$("wp-cc"); if(cc) cc.textContent=el.value.length+" chars"; }
  }
}

async function sendWp(id) {
  const msg = $("wp-msg")?.value||"";
  if (!msg.trim()) { toast("Enter a message","err"); return; }
  const l = S.leads.find(x=>x.id===id); if (!l) return;
  const ph = (l.phone||"").replace(/\D/g,"");
  window.open(`https://wa.me/${ph.length===10?"91"+ph:ph}?text=${encodeURIComponent(msg)}`,"_blank");
  const t = today();
  try {
    await dbUpdate("leads", {last_contacted:t}, {id});
    S.leads = S.leads.map(l => l.id===id ? {...l, last_contacted:t} : l);
  } catch(e) {}
  closeModal(); toast("WhatsApp opened!"); render();
}

function refreshBulkOpts() {
  const f = $("bk-field")?.value; const s = $("bk-val"); if (!s) return;
  s.innerHTML = '<option value="">— Select —</option>' + (f==="status"?STATUSES:S.categories).map(v=>`<option>${v}</option>`).join("");
}

async function doBulk() {
  const field = $("bk-field")?.value;
  const val = $("bk-val")?.value;
  if (!val) { toast("Select a value","err"); return; }
  const ids = [...S.sel];
  try {
    await dbDelete("leads_bulk_placeholder", ids); // placeholder—we use loop for PATCH
    // Supabase REST supports `id=in.(...)` for PATCH too
    const params = `id=in.(${ids.join(",")})`;
    const r = await fetch(`${URL_BASE}/leads?${params}`, {
      method:"PATCH", headers:HDR, body:JSON.stringify({[field]:val})
    });
    if (!r.ok) throw new Error(await r.text());
    S.leads = S.leads.map(l => S.sel.has(l.id) ? {...l,[field]:val} : l);
    toast(`${ids.length} leads updated`); S.sel.clear(); closeModal(); render();
  } catch(e) { toast("Error: "+e.message,"err"); }
}

    <div class="modal-body">
      <div class="form-group"><label class="label">Name</label><input class="input" id="tf-name" value="${t?.name||""}" placeholder="e.g. Initial Greeting"></div>
      <div class="form-group">
        <label class="label">Message <span style="color:#25D366">· Use {name} to personalize</span></label>
        <textarea class="input" id="tf-msg" rows="5" style="resize:vertical" placeholder="Hello {name}! ...">${t?.message||""}</textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTpl('${id||""}')">✓ Save</button>
      </div>
    </div>`);
}

async function saveTpl(id) {
  const name = $("tf-name")?.value||""; const message = $("tf-msg")?.value||"";
  if (!name||!message) { toast("Fill all fields","err"); return; }
  try {
    if (id) {
      await dbUpdate("templates", {name,message}, {id});
      S.templates = S.templates.map(t => t.id===id ? {...t,name,message} : t);
      toast("Template updated!");
    } else {
      const newT = {id:"t"+Date.now(), name, message};
      await dbInsert("templates", newT);
      S.templates = [...S.templates, newT];
      toast("Template added!");
    }
    closeModal(); render();
  } catch(e) { toast("Error: "+e.message,"err"); }
}

async function deleteTpl(id) {
  if (!confirm("Delete this template?")) return;
  try {
    await dbDelete("templates", {id});
    S.templates = S.templates.filter(t => t.id!==id);
    toast("Deleted"); render();
  } catch(e) { toast("Error","err"); }
}

// ── CATEGORIES ────────────────────────────────────────────────────────────────
function renderCats() {
  return `<div class="fade">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      <div><h1 style="font-size:22px;font-weight:700;color:#d4edd8">Categories</h1><p style="color:#6b9b6b;font-size:12px">Organize leads by type</p></div>
      <button class="btn btn-primary btn-sm" onclick="openCatForm()">+ Add Category</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:11px">
      ${S.categories.map(cat => {
        const n = S.leads.filter(l=>l.category===cat).length;
        return `<div class="card" style="padding:16px 18px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <p style="font-weight:600;font-size:14px;color:#d4edd8">${cat}</p>
            <p style="font-size:11px;color:#6b9b6b;margin-top:3px">${n} lead${n!==1?"s":""}</p>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:24px;font-weight:700;color:#25D366">${n}</span>
            <button class="action-btn" onclick="deleteCat('${cat}')" title="Delete">🗑</button>
          </div>
        </div>`;}).join("")}
    </div>
  </div>`;
}

function openCatForm() {
  modal(`
    <div class="modal-header">
      <h3 style="font-weight:600;font-size:15px;color:#d4edd8">Add Category</h3>
      ${modalClose()}
    </div>
    <div class="modal-body" style="max-width:400px">
      <div class="form-group"><label class="label">Category Name</label><input class="input" id="cat-name" placeholder="e.g. Luxury Residential"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCat()">Add</button>
      </div>
    </div>`, 400);
}

async function saveCat() {
  const name = ($("cat-name")?.value||"").trim();
  if (!name) { toast("Enter a name","err"); return; }
  if (S.categories.includes(name)) { toast("Already exists","err"); return; }
  try {
    await dbInsert("categories", {name});
    S.categories = [...S.categories, name];
    toast("Category added!"); closeModal(); render();
  } catch(e) { toast("Error: "+e.message,"err"); }
}

async function deleteCat(cat) {
  const n = S.leads.filter(l=>l.category===cat).length;
  if (n > 0) { toast(`Can't delete: ${n} leads use this`,"err"); return; }
  if (!confirm(`Delete "${cat}"?`)) return;
  try {
    await dbDelete("categories", {name:cat});
    S.categories = S.categories.filter(c=>c!==cat);
    toast("Deleted"); render();
  } catch(e) { toast("Error","err"); }
}

// Fix bulk update — replace placeholder function
async function doBulk() {
  const field = $("bk-field")?.value;
  const val = $("bk-val")?.value;
  if (!val) { toast("Select a value","err"); return; }
  const ids = [...S.sel];
  try {
    const params = `id=in.(${ids.join(",")})`;
    const r = await fetch(`${URL_BASE}/leads?${params}`, {
      method:"PATCH", headers:HDR, body:JSON.stringify({[field]:val})
    });
    if (!r.ok) throw new Error(await r.text());
    S.leads = S.leads.map(l => S.sel.has(l.id) ? {...l,[field]:val} : l);
    toast(`${ids.length} leads updated`); S.sel.clear(); closeModal(); render();
  } catch(e) { toast("Error: "+e.message,"err"); }
}

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
