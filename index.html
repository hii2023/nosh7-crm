<style>
:root{
  --bg:#f0f9ff;--card:#fff;--surface:#f8fafc;--border:#e2e8f0;
  --accent:#22c55e;--accent-d:#16a34a;--accent-dim:#dcfce7;
  --wa:#25D366;--wa-d:#128C7E;
  --text:#0f172a;--muted:#64748b;--dim:#94a3b8;
  --red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  --sb-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,textarea,button{font-family:'Sora',sans-serif}

/* sidebar */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sb-w);background:#0f172a;display:flex;flex-direction:column;z-index:200;transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.15)}
#sidebar.hidden{transform:translateX(calc(-1 * var(--sb-w)))}
#sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
#sb-ov.show{display:block}
#main{margin-left:var(--sb-w);transition:margin-left .25s ease;min-height:100vh;padding:20px 24px}
#main.full{margin-left:0}
#tbtn{position:fixed;top:12px;left:12px;z-index:300;width:36px;height:36px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(34,197,94,.4);transition:all .2s}
#tbtn:hover{background:var(--accent-d)}
#tbtn.sh{left:calc(var(--sb-w) + 10px)}

/* nav */
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;margin-bottom:3px;border:1px solid transparent;cursor:pointer;font-size:12px;font-weight:400;transition:all .15s;text-align:left;background:transparent;color:#94a3b8}
.nav-btn:hover{background:#1e293b;color:#e2e8f0}
.nav-btn.active{background:#16a34a22;border-color:#22c55e40;color:#4ade80;font-weight:600}
.nbadge{font-size:10px;padding:1px 6px;border-radius:999px;background:#22c55e20;color:#4ade80;margin-left:auto}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:5px;cursor:pointer;border:none;border-radius:8px;font-weight:500;transition:all .15s;font-size:13px;padding:8px 14px;white-space:nowrap}
.btn-sm{font-size:11px;padding:5px 10px}
.btn-xs{font-size:11px;padding:3px 8px}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 1px 6px rgba(34,197,94,.3)}.btn-p:hover{background:var(--accent-d)}
.btn-s{background:var(--card);color:var(--text);border:1.5px solid var(--border)}.btn-s:hover{background:var(--surface);border-color:var(--accent)}
.btn-d{background:var(--red);color:#fff}.btn-d:hover{background:#dc2626}
.btn-g{background:transparent;color:var(--muted);border:1.5px solid transparent}.btn-g:hover{background:var(--surface);border-color:var(--border)}
.btn-wa{background:var(--wa);color:#fff;font-size:11px;padding:4px 9px;border-radius:6px}.btn-wa:hover{background:var(--wa-d)}
.btn-call{background:#3b82f6;color:#fff;font-size:11px;padding:4px 9px;border-radius:6px}.btn-call:hover{background:#2563eb}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

/* inputs */
.input{width:100%;padding:8px 12px;border-radius:8px;font-size:13px;background:var(--card);color:var(--text);border:1.5px solid var(--border);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.fg{margin-bottom:13px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}

/* card / table */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:9px 12px;font-size:10px;color:var(--muted);font-weight:600;user-select:none;white-space:nowrap;background:var(--surface);text-transform:uppercase;letter-spacing:.05em}
.table th.s{cursor:pointer}.table th.s:hover{color:var(--accent)}
.table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
.table tr:last-child td{border-bottom:none}
.table tbody tr:hover td{background:#f0fdf4}

/* modal */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:18px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mh{padding:16px 22px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1}
.mb{padding:22px}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.ab{padding:5px;border-radius:6px;background:transparent;border:none;cursor:pointer;display:inline-flex;transition:background .1s;color:var(--muted)}
.ab:hover{background:var(--surface)}

/* stat card */
.stat{flex:1;min-width:90px;padding:14px 16px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s}
.stat.cl{cursor:pointer}.stat.cl:hover{border-color:var(--accent);box-shadow:0 4px 12px rgba(34,197,94,.15)}

/* mobile lead cards */
.lead-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.lead-card-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.lead-field{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:12px;color:var(--muted)}
.lead-field strong{color:var(--text);font-weight:500}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.spin{animation:spin .7s linear infinite}
.fade{animation:fadeIn .2s ease}

/* desktop: show full table */
.mobile-only{display:none}
.desktop-only{display:block}

@media(max-width:768px){
  #sidebar{width:280px !important}
  #sidebar.hidden{transform:translateX(-280px)}
  #sb-ov{display:block;pointer-events:none;opacity:0;transition:opacity .25s}
  #sb-ov.show{pointer-events:all;opacity:1}
  #main{margin-left:0 !important;padding:12px 10px}
  #tbtn{left:12px !important}
  #tbtn.sh{left:12px !important}

  .mobile-only{display:block}

</style>

// ── PHONE NORMALIZER ─────────────────────────────────────────────────────────
// Strips +91, country code, leading 0, spaces, dashes → stores last 10 digits only
function cleanPhone(raw){
  if(!raw)return"";
  let d=String(raw).replace(/[\s\-\(\)\.]/g,""); // remove spaces, dashes, brackets, dots
  d=d.replace(/^\+91/,"");   // strip +91 prefix
  d=d.replace(/^91(?=\d{10}$)/,"");  // strip 91 if followed by exactly 10 digits
  d=d.replace(/^0/,"");      // strip leading 0
  d=d.replace(/\D/g,"");     // remove any remaining non-digits
  return d.slice(-10);       // keep last 10 digits only
}

// Display phone with +91 prefix — always cleans first to prevent double +91
function dispPhone(p){
  if(!p)return"";
  const c=cleanPhone(p);
  return c?`+91 ${c}`:"";
}
// Tel link — always clean
function telLink(p){return`tel:+91${cleanPhone(p)}`;}
// WA link — always clean
function waLink(p){return`https://wa.me/91${cleanPhone(p)}`;}
// ── WEBSITE NORMALIZER ───────────────────────────────────────────────────────
// Strips http://, https://, www. — stores clean domain only (e.g. example.com)
function cleanWebsite(raw){
  if(!raw)return"";
  return String(raw)
    .trim()
    .replace(/^https?:\/\//i,"")   // strip http:// or https://
    .replace(/^www\./i,"")          // strip www.
    .replace(/\/$/,"");             // strip trailing slash
}

// Build full URL for opening
function webURL(w){
  const d=cleanWebsite(w);
  return d?`https://www.${d}`:"";
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function toggleSB(force){
  const open=force!==undefined?force:!S.sbOpen;
  S.sbOpen=open;
  const sb=$("sidebar"),main=$("main"),btn=$("tbtn"),ov=$("sb-ov");
  if(open){
    sb.classList.remove("hidden");
    if(window.innerWidth>768){main.classList.remove("full");btn.classList.add("sh");}
    else{ov.classList.add("show");}
  }else{
    sb.classList.add("hidden");main.classList.add("full");btn.classList.remove("sh");ov.classList.remove("show");
  }
}
function initSB(){if(window.innerWidth<=768)toggleSB(false);else toggleSB(true);}
window.addEventListener("resize",()=>{if(window.innerWidth>768&&S.sbOpen){$("main").classList.remove("full");$("tbtn").classList.add("sh");}});

function go(tab){
  S.tab=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  $("nav-"+tab)?.classList.add("active");
  if(window.innerWidth<=768)toggleSB(false);
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  loadGroups();
  initSB();
  try{
    const[leads,tpls,cats]=await Promise.all([
      api.get("leads","order=created_date.desc"),
      api.get("templates"),
      api.get("categories")
    ]);
    S.leads=leads||[];
    S.templates=tpls?.length?tpls:(await api.post("templates",DEF_T),DEF_T);
    S.categories=cats?.length?cats.map(r=>r.name):(await api.post("categories",DEF_C.map(n=>({name:n}))),DEF_C);
    setDB(true);setCount();render();
  }catch(e){
    console.error(e);setDB(false);
    S.templates=DEF_T;S.categories=DEF_C;
    toast("DB error: "+e.message,"err");render();
  }
}

function render(){
  const m=$("main");if(!m)return;
  if(S.tab==="dashboard") m.innerHTML=renderDash();
  if(S.tab==="leads")     m.innerHTML=renderLeads();
  if(S.tab==="templates") m.innerHTML=renderTpls();
  if(S.tab==="categories")m.innerHTML=renderCats();
  if(S.tab==="analytics") m.innerHTML=renderAnalytics();
  renderBulkBar();
}

// ── LEADS ────────────────────────────────────────────────────────────────────
// Split a lead's category field into array (handles "Cat1, Cat2" from backend)
function leadCats(l){
  if(!l.category)return[];
  return l.category.split(/[,;|]+/).map(c=>c.trim()).filter(Boolean);
}
// Check if lead belongs to a given category (partial match support)
function hasCategory(l,cat){
  return leadCats(l).some(c=>c.toLowerCase()===cat.toLowerCase());
}

function filtL(){
  const f=S.f;let r=[...S.leads];
  // Custom dashboard filters override normal filters
  if(S._customFilter==="followup_today"){
    const t=today();return r.filter(x=>x.follow_up_date===t);
  }
  if(S._customFilter==="no_followup"){
    return r.filter(x=>x.status!=="New"&&x.status!=="Converted"&&x.status!=="Lost"&&!x.follow_up_date);
  }
  if(f.search){const q=f.search.toLowerCase();r=r.filter(l=>(l.name||"").toLowerCase().includes(q)||(l.phone||"").includes(q)||(l.email||"").toLowerCase().includes(q)||(l.area||"").toLowerCase().includes(q)||(l.category||"").toLowerCase().includes(q)||(l.notes||"").toLowerCase().includes(q));}
  if(f.status!=="all")r=r.filter(l=>l.status===f.status);
  if(f.category!=="all")r=r.filter(l=>hasCategory(l,f.category));
  r.sort((a,b)=>{const av=a[f.sort]||"",bv=b[f.sort]||"";return f.dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);});
  return r;
}

function renderLeads(){
  const f=S.f,rows=filtL(),total=rows.length;
  const perPage=f.showAll?total:PER;
  const pages=Math.ceil(total/perPage)||1;
  const paged=f.showAll?rows:rows.slice((f.page-1)*PER,(f.page)*PER);
  const selN=S.sel.size,allChk=rows.length>0&&rows.every(l=>S.sel.has(l.id));
  const arr=k=>f.sort===k?(f.dir==="asc"?"▲":"▼"):"";

  // Pagination
  let pgHtml="";
  if(!f.showAll&&pages>1){
    pgHtml+=`<button class="btn btn-s btn-sm" onclick="lPage(${Math.max(1,f.page-1)})" ${f.page===1?"disabled":""}>‹</button>`;

function lFil(k,v){S.f[k]=v;S._customFilter=null;if(k!=="showAll")S.f.page=1;render();}
function lSort(k){if(S.f.sort===k)S.f.dir=S.f.dir==="asc"?"desc":"asc";else{S.f.sort=k;S.f.dir="asc";}render();}
function lPage(p){S.f.page=p;render();}
function togAll(c){const all=filtL();if(c)all.forEach(l=>S.sel.add(l.id));else S.sel.clear();render();}

// Smart search: fires immediately if cleared, fires after 4+ chars, debounces 400ms
let _searchTimer=null;
function lSearch(v){
  S.f.search=v;S.f.page=1;S._customFilter=null;
  clearTimeout(_searchTimer);
  if(!v||v.length>=4){
    // Search immediately on clear or 4+ chars
    _searchTimer=setTimeout(()=>render(),300);
  }
  // Don't re-render for 1–3 chars, just keep typing
}

// Expand/collapse hidden details (desktop)
function toggleExpand(id){
  const row=document.getElementById("exp-"+id);
  const btn=document.getElementById("expbtn-"+id);
  if(!row)return;
  const open=row.style.display!=="none";
  row.style.display=open?"none":"table-row";
  if(btn)btn.textContent=open?"▾":"▴";
}
// Expand/collapse hidden details (mobile)
function toggleExpandCard(id,btn){
  const el=document.getElementById("mexp-"+id);
  if(!el)return;
  const open=el.style.display!=="none";
  el.style.display=open?"none":"block";
  if(btn)btn.textContent=open?"▾ more":"▴ less";
}
function toggleOne(id,c){c?S.sel.add(id):S.sel.delete(id);renderBulkBar();
  // Update row highlight without full re-render
  const row=document.querySelector(`tr[data-id="${id}"]`);
  if(row)row.style.background=c?"#f0fdf4":"";
  const card=document.querySelector(`.lead-card[data-id="${id}"]`);
  if(card)card.style.background=c?"#f0fdf4":"";
}

async function delLead(id){
  if(!confirm("Delete this lead?"))return;
  try{await api.del("leads",`id=eq.${id}`);S.leads=S.leads.filter(l=>l.id!==id);S.sel.delete(id);setCount();toast("Lead deleted");render();}
  catch(e){toast("Delete failed","err");}
}
async function bulkDel(){
  const ids=[...S.sel];if(!ids.length||!confirm(`Delete ${ids.length} leads?`))return;
  try{await api.del("leads",`id=in.(${ids.join(",")})`);S.leads=S.leads.filter(l=>!S.sel.has(l.id));S.sel.clear();setCount();toast(`${ids.length} deleted`);render();}
  catch(e){toast("Error","err");}
}
function toggleExpMenu(){
  const m=document.getElementById("exp-menu");if(!m)return;
  const open=m.style.display!=="none";
  m.style.display=open?"none":"block";
  if(!open){
    // Close on outside click
    setTimeout(()=>{
      const close=e=>{if(!document.getElementById("exp-wrap")?.contains(e.target)){m.style.display="none";document.removeEventListener("click",close);}};
      document.addEventListener("click",close);
    },10);
  }
}

function exportAll(){
  const rows=filtL();
  const h=["Name","Phone","Email","Website","Address","Area","Status","Category","Follow Up","Last Contacted","Notes","Created Date"];
  const csv=[h.join(","),...rows.map(l=>[
    l.name, cleanPhone(l.phone), l.email, cleanWebsite(l.website),
    l.address, l.area, l.status, l.category,
    l.follow_up_date, l.last_contacted, l.notes, l.created_date
  ].map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download=`nosh7_leads_${today()}.csv`;a.click();
  toast("Full export downloaded!");
}

function exportRekart(){
  // Rekart import format columns (from template)
  const h=["name","phone","email","address1","address2","landmark","city","pincode","state","country","gps_location","address_type","address_other","route_name","credit_limit","custom_warning_limit","custom_block_limit","product_name","plan_name","rate","delivery_time","plan_quota","start_date","end_date","schedule_type","schedule_type_daily","daily_quantity","alt_day_1","alt_day_2","nth_day_pattern","custom_mon","custom_tue","custom_wed","custom_thu","custom_fri","custom_sat","custom_sun"];
  const rows=filtL();
  const data=rows.map(l=>{
    // Split address into address1 + address2 if long
    const addr=(l.address||"").trim();
    const addr1=addr.length>50?addr.substring(0,50):addr;
    const addr2=addr.length>50?addr.substring(50):"";
    const row={
      name:l.name||"",
      phone:cleanPhone(l.phone)||"",
      email:l.email||"",
      address1:addr1,
      address2:addr2,
      landmark:"",
      city:l.area||"",
      pincode:"",state:"Gujarat",country:"India",
      gps_location:"",address_type:"Home",address_other:"",
      route_name:"",credit_limit:"",custom_warning_limit:"",custom_block_limit:"",
      product_name:"",plan_name:"",rate:"",delivery_time:"",plan_quota:"",
      start_date:"",end_date:"",schedule_type:"",schedule_type_daily:"",daily_quantity:"",
      alt_day_1:"",alt_day_2:"",nth_day_pattern:"",
      custom_mon:"",custom_tue:"",custom_wed:"",custom_thu:"",custom_fri:"",custom_sat:"",custom_sun:""
    };
    return h.map(k=>`"${(row[k]||"").replace(/"/g,'""')}"`).join(",");
  });
  const csv=[h.join(","),...data].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download=`nosh7_rekart_${today()}.csv`;a.click();
  toast("Rekart format exported — ready to import!");
}

  // Find the clicked cell/element to position near it
  modal(`
    <div class="mh"><h3 style="font-weight:700;font-size:15px">⚡ Quick Status — ${l.name}</h3>${mX()}</div>
    <div class="mb" style="padding-bottom:12px">
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Current: ${badge(l.status)} · Select new status:</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

function mapCols(headers){
  const m={};
  headers.forEach((h,i)=>{
    const k=h.toLowerCase().replace(/[\s_\-\.\/]/g,"");
    if(m.name===undefined&&(k==="name"||k==="fullname"||k==="leadname"||k==="customer"||k==="clientname"))m.name=i;
    if(m.phone===undefined&&(k.includes("phone")||k.includes("mobile")||k.includes("contact")||k.includes("cell")||k.includes("whatsapp")||k.includes("number")))m.phone=i;
    if(m.email===undefined&&(k.includes("email")||k.includes("mail")))m.email=i;
    if(m.website===undefined&&(k.includes("website")||k.includes("web")||k.includes("url")||k.includes("site")))m.website=i;
    if(m.address===undefined&&(k.includes("address")||k.includes("addr")||k.includes("street")))m.address=i;
    if(m.area===undefined&&(k.includes("area")||k.includes("zone")||k.includes("locality")||k.includes("city")||k.includes("region")||k.includes("location")))m.area=i;
    if(m.category===undefined&&(k.includes("category")||k.includes("cat")||k.includes("type")||k.includes("segment")))m.category=i;
    if(m.status===undefined&&k.includes("status"))m.status=i;
    if(m.notes===undefined&&(k.includes("note")||k.includes("remark")||k.includes("comment")||k.includes("desc")||k.includes("requirement")))m.notes=i;
    if(m.follow_up_date===undefined&&(k.includes("follow")||k.includes("duedate")||k.includes("nextcall")||k.includes("callback")))m.follow_up_date=i;
    if(m.last_contacted===undefined&&(k.includes("last")&&(k.includes("contact")||k.includes("call")||k.includes("spoke"))))m.last_contacted=i;
  });
  return m;
}

function rowToLead(vals,m){
  const g=k=>m[k]!==undefined?(vals[m[k]]||"").toString().trim():"";
  return {
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    name:g("name"),
    phone:cleanPhone(g("phone")),
    email:g("email"),
    website:cleanWebsite(g("website")),
    address:g("address"),area:g("area"),category:g("category")||S.categories[0]||"",
    status:STATUSES.includes(g("status"))?g("status"):"New",
    notes:g("notes"),follow_up_date:g("follow_up_date"),last_contacted:g("last_contacted"),
    created_date:today()
  };
}

async function doImport(){
  const all=window._imp||[];
  const mode=$("imp-mode")?.value||"skip";
  const existMap=new Map(S.leads.map(l=>[cleanPhone(l.phone),l]));
  const toIns=[],toUpd=[];
  all.forEach(l=>{
    const ph=cleanPhone(l.phone);
    if(existMap.has(ph)){if(mode==="update"||mode==="both")toUpd.push({...l,id:existMap.get(ph).id,created_date:existMap.get(ph).created_date});}
    else{toIns.push(l);}
  });
  try{
    if(toIns.length)await api.post("leads",toIns);
    // Batch update: patch each individually (Supabase REST supports in() for patch too)
    for(const l of toUpd){
      await api.patch("leads",l,`id=eq.${l.id}`);
      S.leads=S.leads.map(x=>x.id===l.id?l:x);
    }
    if(toIns.length)S.leads=[...toIns,...S.leads];
    setCount();toast(`✅ Added ${toIns.length} new · Updated ${toUpd.length}`);closeModal();render();
  }catch(err){toast("Import failed: "+err.message,"err");}
}

function parseFile(file){
  return new Promise((res,rej)=>{
    const ext=file.name.split(".").pop().toLowerCase();
    if(ext==="csv"||ext==="txt"){
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const lines=ev.target.result.split(/\r?\n/).filter(l=>l.trim());
          if(!lines.length){rej(new Error("Empty file"));return;}
          const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
          const rows=lines.slice(1).map(l=>{
            const vals=[];let cur="",inQ=false;
            for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){vals.push(cur.trim());cur="";}else cur+=c;}
            vals.push(cur.trim());
            return vals.map(v=>v.replace(/^"|"$/g,""));
          });
          res({headers,rows});
        }catch(e){rej(e);}
      };
      r.onerror=()=>rej(new Error("Read failed"));r.readAsText(file);
    }else if(["xlsx","xls","ods"].includes(ext)){
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const wb=XLSX.read(ev.target.result,{type:"binary"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(!data.length){rej(new Error("Empty sheet"));return;}
          res({headers:data[0].map(h=>String(h).trim()),rows:data.slice(1).map(r=>r.map(v=>String(v).trim()))});
        }catch(e){rej(e);}
      };
      r.onerror=()=>rej(new Error("Read failed"));r.readAsBinaryString(file);
    }else{rej(new Error("Unsupported file. Use CSV, XLS, XLSX, or ODS. For Apple Numbers: File → Export To → Excel."));}
  });
}

function paSelectStatus(btn,status){
  // Deselect all, re-render with plain style
  document.querySelectorAll("#pa-statuses button").forEach(b=>{

    // Remove checkmark if present
    const chk=b.querySelector("span[style*='✓']");if(chk)chk.remove();
  });
  // Highlight selected
  btn.style.borderColor="var(--accent)";btn.style.background="var(--accent-dim)";btn.style.fontWeight="700";
  const chk=document.createElement("span");
  chk.style.cssText="color:var(--accent);margin-left:auto;font-size:10px";
  chk.textContent="✓";
  btn.appendChild(chk);
  window._paNewStatus=status;
}

async function savePostAction(leadId){
  const newStatus=window._paNewStatus;
  const origStatus=window._paOrigStatus;
  const followup=document.getElementById("pa-followup")?.value||"";
  const updates={};
  // Only write status if actually changed
  if(newStatus && newStatus!==origStatus) updates.status=newStatus;
  // Only write follow_up if it differs from current
  const lead=S.leads.find(l=>l.id===leadId);
  if(followup && followup!==(lead?.follow_up_date||"")) updates.follow_up_date=followup;
  if(!followup && lead?.follow_up_date) {} // don't clear unless explicitly cleared
  if(Object.keys(updates).length){
    try{
      await api.patch("leads",updates,`id=eq.${leadId}`);
      S.leads=S.leads.map(l=>l.id===leadId?{...l,...updates}:l);
      const parts=[];
      if(updates.status) parts.push(`Status → ${updates.status}`);
      if(updates.follow_up_date) parts.push(`Follow-up → ${updates.follow_up_date}`);
      toast(parts.join(" · ")+" ✓");
    }catch(e){toast("Save error","err");}
  }else{
    toast("No changes made");
  }
  closeModal();render();
}

function applyEmailTpl(tid,lid){
  if(!tid)return;
  const t=S.templates.find(x=>x.id===tid),l=S.leads.find(x=>x.id===lid);
  if(t&&l){
    const body=$("em-body");
    if(body){body.value=t.message.replace(/{name}/g,l.name);const c=$("em-c");if(c)c.textContent=body.value.length+" chars";}
    // Use template's subject field, fall back to template name
    const sub=$("em-sub");
    if(sub)sub.value=(t.subject||"").replace(/{name}/g,l.name)||(sub.value||t.name);
  }
}

async function sendEmail(id){
  const l=S.leads.find(x=>x.id===id);if(!l)return;
  const subject=$("em-sub")?.value||"";
  const body=$("em-body")?.value||"";
  // Build mailto: link
  const mailto=`mailto:${l.email}${subject||body?"?":""}${subject?"subject="+encodeURIComponent(subject):""}${subject&&body?"&":""}${body?"body="+encodeURIComponent(body):""}`;
  window.open(mailto);
  // Update last_contacted
  const t=today();
  try{await api.patch("leads",{last_contacted:t},`id=eq.${id}`);S.leads=S.leads.map(x=>x.id===id?{...x,last_contacted:t}:x);}catch(e){}

  // Prompt status + follow-up after a short delay (email app opens)
  setTimeout(()=>promptPostAction(id,"email"),500);
}

// Bulk template import from CSV/Excel
async function importTemplates(event){
  const file=event.target.files[0];if(!file)return;
  event.target.value="";
  try{
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
    if(!rows.length){toast("No rows found","err");return;}

    // Flexible column mapping
    const map=(row,keys)=>{for(const k of keys){const v=row[k]||row[k.toLowerCase()]||row[k.toUpperCase()]||"";if(v)return String(v).trim();}return "";};

    let added=0,skipped=0;
    const toAdd=[];
    for(const row of rows){
      const name=map(row,["name","Name","template_name","Template Name"]);
      const subject=map(row,["subject","Subject","email_subject","Email Subject"]);
      const message=map(row,["message","Message","body","Body","text","Text"]);
      if(!name||!message){skipped++;continue;}
      if(S.templates.some(t=>t.name===name)){skipped++;continue;} // skip duplicates
      toAdd.push({id:"t"+Date.now()+"_"+added,name,subject,message});
      added++;
    }
    if(toAdd.length){
      await api.post("templates",toAdd);
      S.templates=[...S.templates,...toAdd];
      toast(`✓ ${added} templates imported${skipped?` · ${skipped} skipped`:""}`);
      render();
    }else{
      toast(skipped?`All ${skipped} rows skipped (duplicates or missing data)`:"Nothing to import","err");
    }
  }catch(e){toast("Import error: "+e.message,"err");}
}

          </div>
          <p style="font-size:11px;color:var(--muted)">${n} lead${n!==1?"s":""}</p>
          <p style="font-size:24px;font-weight:700;color:var(--accent);line-height:1;margin-top:6px">${n}</p>
        </div>`;}).join("")}
    </div>
  </div>`;
}
function openCF(){
  modal(`<div class="mh"><h3 style="font-weight:700;font-size:15px">➕ Add Category</h3>${mX()}</div>
    <div class="mb" style="max-width:400px">
      <div class="fg"><label class="label">Category Name</label><input class="input" id="cn" placeholder="e.g. Luxury Residential"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-p" onclick="saveCat()">Add</button>
      </div>
    </div>`,400);
}
async function saveCat(){
  const name=($("cn")?.value||"").trim();
  if(!name){toast("Enter a name","err");return;}
  if(S.categories.includes(name)){toast("Already exists","err");return;}
  try{await api.post("categories",{name});S.categories=[...S.categories,name];toast("Added!");closeModal();render();}
  catch(e){toast("Error: "+e.message,"err");}
}
function openRC(old){
  modal(`<div class="mh"><h3 style="font-weight:700;font-size:15px">✏️ Rename: ${old}</h3>${mX()}</div>
    <div class="mb" style="max-width:400px">
      <div class="fg"><label class="label">New Name</label><input class="input" id="rn" value="${old}"></div>
      <p style="font-size:11px;color:var(--muted);margin-bottom:12px">⚠️ All leads in <strong>${old}</strong> will be updated.</p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-p" onclick="renameCat('${old}')">✓ Rename</button>
      </div>
    </div>`,400);
}
async function renameCat(old){
  const n=($("rn")?.value||"").trim();
  if(!n||n===old){toast("Enter a different name","err");return;}
  if(S.categories.includes(n)){toast("Name already exists","err");return;}
  try{
    await api.post("categories",{name:n});
    await api.patch("leads",{category:n},`category=eq.${encodeURIComponent(old)}`);
    await api.del("categories",`name=eq.${encodeURIComponent(old)}`);
    S.categories=S.categories.map(c=>c===old?n:c);
    S.leads=S.leads.map(l=>l.category===old?{...l,category:n}:l);
    toast(`Renamed to "${n}"`);closeModal();render();
  }catch(e){toast("Error: "+e.message,"err");}
}
async function delCat(cat){
  const n=S.leads.filter(l=>l.category===cat).length;
  if(n>0){toast(`Can't delete: ${n} leads use this`,"err");return;}
  if(!confirm(`Delete "${cat}"?`))return;
  try{await api.del("categories",`name=eq.${encodeURIComponent(cat)}`);S.categories=S.categories.filter(c=>c!==cat);toast("Deleted");render();}
  catch(e){toast("Error","err");}
}

// ── PWA: SERVICE WORKER REGISTRATION ─────────────────────────────────────────
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("/sw.js")
      .then(reg=>{
        console.log("[NOSH7] SW registered:", reg.scope);
        // Check for updates every time app opens
        reg.addEventListener("updatefound", ()=>{
          const newSW = reg.installing;
          newSW.addEventListener("statechange", ()=>{
            if(newSW.state==="installed" && navigator.serviceWorker.controller){
              // New version available — show update banner
              showUpdateBanner();
            }
          });
        });
      })
      .catch(err=>console.warn("[NOSH7] SW failed:", err));
  });
}

// Show a gentle "Update available" banner
function showUpdateBanner(){
  const b=document.createElement("div");
  b.style.cssText="position:fixed;top:0;left:0;right:0;z-index:9999;background:#0f172a;color:#f1f5f9;padding:10px 18px;display:flex;align-items:center;gap:10px;font-size:13px;font-family:Sora,sans-serif;box-shadow:0 2px 12px rgba(0,0,0,.2)";
  b.innerHTML=`<span style="flex:1">🔄 New version of NOSH7 CRM available</span><button onclick="window.location.reload()" style="background:#22c55e;color:#fff;border:none;border-radius:7px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:Sora,sans-serif;font-weight:600">Update</button><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px">✕</button>`;
  document.body.prepend(b);
}

// ── PWA: INSTALL PROMPT ───────────────────────────────────────────────────────
let _installPrompt=null;
window.addEventListener("beforeinstallprompt", e=>{
  e.preventDefault();
  _installPrompt=e;
  // Show install button after 3 seconds if not already installed
  setTimeout(showInstallHint, 3000);
});

function showInstallHint(){
  if(!_installPrompt || localStorage.getItem("pwa-dismissed"))return;
  const b=document.createElement("div");
  b.id="install-hint";
  b.style.cssText="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:9998;background:#0f172a;color:#f1f5f9;padding:12px 18px;border-radius:14px;display:flex;align-items:center;gap:10px;font-size:12px;font-family:Sora,sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.25);max-width:340px;width:90%";
  b.innerHTML=`<span style="font-size:22px">📲</span><span style="flex:1;line-height:1.5">Install <strong>NOSH7 CRM</strong> on your home screen for quick access</span><button onclick="triggerInstall()" style="background:#22c55e;color:#fff;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:Sora,sans-serif;font-weight:600;white-space:nowrap">Install</button><button onclick="dismissInstall()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;padding:0 2px">✕</button>`;
  document.body.appendChild(b);
}

function triggerInstall(){
  if(!_installPrompt)return;
  _installPrompt.prompt();
  _installPrompt.userChoice.then(r=>{
    if(r.outcome==="accepted"){toast("NOSH7 CRM installed! ✅");}
    _installPrompt=null;
    document.getElementById("install-hint")?.remove();
  });
}
function dismissInstall(){
  localStorage.setItem("pwa-dismissed","1");
  document.getElementById("install-hint")?.remove();
}

// Handle ?action=add shortcut from PWA home screen icon
window.addEventListener("load",()=>{
  if(new URLSearchParams(location.search).get("action")==="add"){
    setTimeout(()=>openLF(), 800);
  }
});

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
